<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mandos — profile · spotlight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root { --accent: #f5851f; --gold: #ffb64a; --bg: #0e0d0d; color-scheme: dark; }
      body { background: #101012; color: #e8e8ea; font-family: "Poppins", system-ui, -apple-system, sans-serif; padding: 34px 28px 70px; }
      header { max-width: 1200px; margin: 0 auto; }
      h1 { font-size: 20px; font-weight: 600; }
      .sub { font-size: 13px; color: #8f8f98; margin-top: 4px; max-width: 640px; line-height: 1.55; }
      .row { max-width: 1200px; margin: 32px auto 0; display: flex; flex-wrap: wrap; gap: 46px; justify-content: center; align-items: flex-start; }
      .item { width: 372px; }
      .item.big { width: 396px; }
      .cap { margin: 0 0 12px 4px; }
      .cap b { font-size: 14px; font-weight: 600; }
      .cap b i { font-style: normal; color: var(--gold); font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; margin-left: 8px; background: rgba(245,133,31,.12); padding: 3px 8px; border-radius: 999px; }
      .cap span { display: block; font-size: 11.5px; color: #8f8f98; margin-top: 3px; }

      .phone { width: 100%; aspect-ratio: 428/928; position: relative; border-radius: 50px; padding: 4px;
        background: linear-gradient(140deg,#6f6f77,#25252a 16%,#3b3b42 38%,#141416 62%,#4c4c56 84%,#1c1c20);
        box-shadow: 0 28px 68px -18px rgba(0,0,0,.8), inset 0 1px 1px rgba(255,255,255,.14); }
      .scr { position: absolute; inset: 4px; border-radius: 46px; overflow: hidden;
        background: radial-gradient(130% 66% at 50% 4%, #1a1613 0%, #100e0d 46%, var(--bg) 100%); }

      .wall { position: absolute; inset: 0; z-index: 0; opacity: .6;
        background: repeating-linear-gradient(90deg, transparent 0 46px, rgba(255,255,255,.014) 46px 47px);
        -webkit-mask-image: linear-gradient(180deg,#000,transparent 62%); mask-image: linear-gradient(180deg,#000,transparent 62%); }

      .stat { position: absolute; top: 0; left: 0; right: 0; height: 36px; display: flex; align-items: center; justify-content: space-between; padding: 10px 24px 0; font-size: 13px; font-weight: 600; color: #fff; z-index: 30; }
      .stat .sbr { display: flex; gap: 5px; align-items: center; }
      .isl { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 92px; height: 25px; background: #000; border-radius: 15px; z-index: 6; }
      .acts { position: absolute; top: 44px; right: 18px; display: flex; gap: 10px; z-index: 20; }
      .acts .b { width: 38px; height: 38px; border-radius: 50%; display: grid; place-items: center; color: #f0c79a; background: rgba(255,255,255,.02); border: 1px solid rgba(245,133,31,.4); }
      .acts svg { width: 16px; height: 16px; }

      /* the lamp */
      .lamp { position: absolute; left: 50%; top: -2px; width: 66px; height: 84px; transform: translateX(-50%); z-index: 8;
        background: linear-gradient(180deg,#202024 0%, #131316 26%, #0c0b0b 52%, #1d1510 80%, #34230f 100%);
        border-radius: 4px 4px 17px 17px;
        box-shadow: 0 12px 24px rgba(0,0,0,.66), inset 0 -15px 20px rgba(0,0,0,.6), inset 0 2px 0 rgba(255,255,255,.09), inset 2px 0 3px rgba(255,255,255,.04), inset -2px 0 4px rgba(0,0,0,.5); }
      .lamp::before { content: ""; position: absolute; left: 50%; top: -8px; transform: translateX(-50%); width: 8px; height: 10px; background: #16161a; border-radius: 2px; }
      .lamp .lens { position: absolute; left: 50%; bottom: -5px; transform: translateX(-50%); width: 48px; height: 18px; border-radius: 50%;
        background: radial-gradient(ellipse at 50% 34%, #fff0d6 0%, #ffb057 48%, #a8500e 86%);
        box-shadow: 0 0 34px 12px rgba(255,180,92,.82), 0 0 74px 28px rgba(255,150,70,.34); }

      /* volumetric cone */
      .cone { position: absolute; left: 50%; top: 66px; transform: translateX(-50%); z-index: 1; pointer-events: none; mix-blend-mode: screen; filter: blur(12px);
        width: 460px; height: 600px; clip-path: polygon(47.6% 0, 52.4% 0, 87% 100%, 13% 100%);
        background: linear-gradient(180deg, rgba(255,201,133,.42) 0%, rgba(255,170,90,.17) 30%, rgba(255,150,70,.05) 56%, transparent 78%); }
      .cone.hot { width: 460px; filter: blur(9px); clip-path: polygon(48.7% 0, 51.3% 0, 73% 94%, 27% 94%);
        background: linear-gradient(180deg, rgba(255,228,178,.52) 0%, rgba(255,193,124,.16) 38%, transparent 72%); }
      .pool { position: absolute; left: 50%; top: 250px; width: 340px; height: 300px; transform: translateX(-50%); z-index: 1; pointer-events: none; mix-blend-mode: screen; filter: blur(10px);
        background: radial-gradient(ellipse 48% 44% at 50% 42%, rgba(255,172,84,.30), transparent 64%); }

      /* hero content */
      .hero { position: absolute; left: 0; right: 0; top: 26%; z-index: 8; text-align: center; padding: 0 30px; }
      .ghost { width: 112px; height: 112px; border-radius: 50%; margin: 0 auto; position: relative; display: grid; place-items: center; color: #d8d8dc;
        border: 2px solid rgba(255,255,255,.32); background: radial-gradient(circle at 50% 36%, rgba(255,196,120,.16), rgba(255,255,255,.015)); box-shadow: 0 0 44px rgba(255,170,80,.16); }
      .ghost svg { width: 50px; height: 50px; }
      .ghost .plusb { position: absolute; right: 2px; bottom: 6px; width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center; color: #fff;
        background: linear-gradient(140deg,#ffb14a,#f5851f); border: 3px solid var(--bg); box-shadow: 0 4px 12px -2px rgba(245,133,31,.7); }
      .ghost .plusb svg { width: 15px; height: 15px; }
      .hl-t { font-size: 25px; font-weight: 600; margin-top: 22px; letter-spacing: -.01em; }
      .hl-s { font-size: 14px; color: #a2a2aa; margin-top: 8px; line-height: 1.45; }
      .add-banner { display: inline-flex; align-items: center; gap: 9px; margin-top: 24px; padding: 12px 24px; border-radius: 999px; font: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
        color: var(--accent); background: rgba(245,133,31,.06); border: 1.5px solid rgba(245,133,31,.65); }
      .add-banner svg { width: 17px; height: 17px; }

      .fab-cam { position: absolute; right: 18px; top: 70%; width: 54px; height: 54px; border-radius: 50%; display: grid; place-items: center; z-index: 9; color: #cfcfd4;
        background: rgba(255,255,255,.055); border: 1px solid rgba(255,255,255,.12); backdrop-filter: blur(6px); }
      .fab-cam svg { width: 21px; height: 21px; }

      /* profile footer (peeking) */
      .foot { position: absolute; left: 0; right: 0; top: 80%; z-index: 8; text-align: center; }
      .avatar { width: 96px; height: 96px; border-radius: 50%; margin: 0 auto; position: relative; display: grid; place-items: center; font-size: 27px; font-weight: 700; color: #fff;
        background: linear-gradient(145deg,#ffc357,#f5851f 46%,#e0500e); box-shadow: 0 12px 30px -8px rgba(245,133,31,.6), inset 0 1px 2px rgba(255,255,255,.5); }
      .cam-badge { position: absolute; right: -2px; bottom: -2px; width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center; background: #1f1f22; border: 3px solid var(--bg); color: #fff; }
      .cam-badge svg { width: 15px; height: 15px; }
      .name { font-size: 22px; font-weight: 600; margin-top: 14px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Mandos — profile · spotlight</h1>
      <div class="sub">The empty banner as a stage: a hanging light throws a warm cone onto “you”. Same idea as your reference. Two intensities below.</div>
    </header>
    <div class="row" id="row"></div>

    <script>
      const IC = {
        qr:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.6"/><rect x="14" y="3" width="7" height="7" rx="1.6"/><rect x="3" y="14" width="7" height="7" rx="1.6"/><path d="M14 14.5h2.5M20.5 14v2.5M14 20.5h2.5M20.5 19.5v1M17.5 17.5h.01"/></svg>',
        search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.2-4.2"/></svg>',
        gear:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v2.4M12 18.6V21M3 12h2.4M18.6 12H21M5.6 5.6l1.7 1.7M16.7 16.7l1.7 1.7M18.4 5.6l-1.7 1.7M7.3 16.7l-1.7 1.7"/></svg>',
        cam:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 8h2.6l1.3-1.9h7l1.3 1.9h2.6a1.2 1.2 0 0 1 1.2 1.2v8.6a1.2 1.2 0 0 1-1.2 1.2H4.5a1.2 1.2 0 0 1-1.2-1.2V9.2A1.2 1.2 0 0 1 4.5 8z"/><circle cx="12" cy="13" r="3.1"/></svg>',
        img:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2.5"/><circle cx="8.5" cy="9.5" r="1.7"/><path d="M4 17l4.5-4.5 4 3.5L16 12l4 4"/></svg>',
        plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
        person:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8.5" r="3.9"/><path d="M4.8 19.6c.8-3.8 3.7-5.8 7.2-5.8s6.4 2 7.2 5.8"/></svg>',
      }
      const statusbar = `<div class="stat"><span>1:40</span><span class="sbr">
        <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><rect x="0" y="7" width="3" height="4" rx="1"/><rect x="4.5" y="5" width="3" height="6" rx="1"/><rect x="9" y="2.5" width="3" height="8.5" rx="1"/><rect x="13.5" y="0" width="3" height="11" rx="1"/></svg>
        <svg width="15" height="11" viewBox="0 0 16 12" fill="currentColor"><path d="M8 2.5c2.3 0 4.4.9 5.9 2.4l1.2-1.2A9.5 9.5 0 008 .8 9.5 9.5 0 00.9 3.7l1.2 1.2A8 8 0 018 2.5z"/><path d="M8 6c1.2 0 2.3.5 3.1 1.3l1.2-1.2A6 6 0 008 4.3a6 6 0 00-4.3 1.8l1.2 1.2A4.4 4.4 0 018 6z"/><circle cx="8" cy="9.5" r="1.6"/></svg>
        <svg width="22" height="11" viewBox="0 0 25 12" fill="none"><rect x="1" y="1" width="21" height="10" rx="2.5" stroke="currentColor" opacity=".5"/><rect x="3" y="3" width="12" height="6" rx="1.2" fill="#3ddc6d"/><rect x="23" y="4" width="1.5" height="4" rx="1" fill="currentColor" opacity=".5"/></svg>
      </span></div>`
      const acts = `<div class="acts"><div class="b">${IC.qr}</div><div class="b">${IC.search}</div><div class="b">${IC.gear}</div></div>`

      const screen = (dim) => `<div class="scr"><div class="wall"></div>${statusbar}${acts}
        <div class="lamp"><div class="lens"></div></div>
        <div class="cone"${dim ? ' style="opacity:.7"' : ''}></div><div class="cone hot"${dim ? ' style="opacity:.7"' : ''}></div><div class="pool"${dim ? ' style="opacity:.6"' : ''}></div>
        <div class="hero"><div class="ghost">${IC.person}<span class="plusb">${IC.plus}</span></div>
          <div class="hl-t">You’re the highlight</div><div class="hl-s">Add a banner and photo<br>to shine.</div>
          <button class="add-banner">${IC.img} Add Banner</button></div>
        <div class="fab-cam">${IC.cam}</div>
        <div class="foot"><div class="avatar">DD<span class="cam-badge">${IC.cam}</span></div><div class="name">dhairya dhairya</div></div>
      </div>`

      const V = [
        { big: true, title: 'Spotlight', tag: 'your ref', note: 'Hanging lamp + warm volumetric cone onto the ghost avatar. Add Banner CTA, camera FAB, DD peeking below.', dim: false },
        { title: 'Dimmed', note: 'Same, softer — for a calmer header.', dim: true },
      ]
      const row = document.getElementById('row')
      V.forEach((v) => {
        const item = document.createElement('div'); item.className = 'item' + (v.big ? ' big' : '')
        item.innerHTML = `<div class="cap"><b>${v.title}${v.tag ? `<i>${v.tag}</i>` : ''}</b><span>${v.note}</span></div><div class="phone">${screen(v.dim)}</div>`
        row.appendChild(item)
      })
    </script>
  </body>
</html>
