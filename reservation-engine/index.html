<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mandos · Reservation Engine Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   MANDOS DESIGN TOKENS  (copy these into your design system)
   ============================================================ */
:root{
  --bg:#0b0b0d; --bg2:#111114; --surface:#1a1a1e; --surface2:#232329;
  --line:#2b2b33; --line2:#3a3a44;
  --text:#f4f4f5; --dim:#9a9aa2; --dim2:#6d6d76;
  --accent:#f5851f; --accent-2:#ff9a3c; --accent-soft:rgba(245,133,31,.14);
  --green:#37c26a; --green-soft:rgba(55,194,106,.14);
  --red:#ff4d4f; --red-soft:rgba(255,77,79,.13);
  --blue:#3b82f6; --blue-soft:rgba(59,130,246,.16);
  --purple:#a855f7; --purple-soft:rgba(168,85,247,.18);
  --amber:#f5a623; --amber-soft:rgba(245,166,35,.15);
  --r:16px; --r-sm:12px; --r-lg:22px;
  --shadow:0 12px 40px rgba(0,0,0,.5);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:#050506;color:var(--text);font-family:'Poppins',system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.ic{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;display:inline-block;flex:none}
.ic.sm{width:16px;height:16px}.ic.lg{width:24px;height:24px}

/* ---------- App shell ---------- */
.app{display:flex;gap:22px;padding:22px;min-height:100vh;align-items:flex-start}
.sidebar{width:264px;flex:none;position:sticky;top:22px;background:var(--bg2);border:1px solid var(--line);border-radius:18px;padding:14px;max-height:calc(100vh - 44px);overflow:auto}
.sidebar h2{font-size:15px;margin:2px 4px 4px}
.sidebar .sub{font-size:11px;color:var(--dim);margin:0 4px 12px}
.seg{display:flex;background:var(--surface);border-radius:999px;padding:4px;margin-bottom:14px}
.seg button{flex:1;padding:8px;border-radius:999px;font-size:13px;font-weight:600;color:var(--dim)}
.seg button.on{background:var(--accent);color:#1a1200}
.nav-group{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim2);margin:14px 4px 6px;font-weight:600}
.nav-item{display:flex;gap:8px;align-items:center;width:100%;text-align:left;padding:8px 10px;border-radius:10px;font-size:12.5px;color:var(--dim);margin-bottom:2px}
.nav-item:hover{background:var(--surface)}
.nav-item.active{background:var(--accent-soft);color:var(--text)}
.nav-item .tagx{font-size:9px;margin-left:auto;color:var(--dim2);border:1px solid var(--line2);padding:1px 5px;border-radius:6px}
.stage{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px}
.stage .hint{font-size:12px;color:var(--dim);text-align:center}
.stage .scrn-name{font-size:13px;color:var(--accent);font-weight:600}

/* ---------- Phone (iPhone-style frame: height-fit, slim metallic bezel) ---------- */
.phone{aspect-ratio:428/928;height:min(940px,calc(100vh - 132px));width:auto;position:relative;flex:none;border-radius:56px;padding:5px;
  background:linear-gradient(140deg,#72727a 0%,#26262b 15%,#3d3d44 37%,#161618 60%,#50505a 82%,#1d1d21 100%);
  box-shadow:0 30px 80px -14px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.05),inset 0 1px 1px rgba(255,255,255,.16)}
.device-screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:52px;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(0,0,0,.6)}
.island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:120px;height:33px;background:#000;border-radius:20px;z-index:30;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}
.home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:135px;height:5px;border-radius:3px;background:rgba(255,255,255,.5);z-index:29;pointer-events:none}
.statusbar{height:48px;display:flex;align-items:center;justify-content:space-between;padding:6px 28px 0;font-size:15px;font-weight:600;position:relative;z-index:5}
.statusbar .sb-r{display:flex;gap:6px;align-items:center}
.screens{position:absolute;top:48px;left:0;right:0;bottom:0}
.screen{position:absolute;inset:0;display:none;flex-direction:column}
.screen.active{display:flex}
.screen-body{flex:1;overflow:auto;padding:14px 16px 20px;display:flex;flex-direction:column;gap:14px}
.screen-body::-webkit-scrollbar{width:0}
.screen-footer{padding:12px 16px 22px;background:linear-gradient(transparent,var(--bg) 26%);flex:none}

/* ---------- Header ---------- */
.apphdr{display:flex;align-items:center;gap:10px;padding:8px 16px 4px;flex:none}
.apphdr h1{font-size:19px;font-weight:600;margin:0}
.apphdr .sub{font-size:11px;color:var(--dim);font-weight:400}
.icon-btn{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:var(--text)}
.icon-btn.bg{background:var(--surface)}
.push{margin-left:auto}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);position:absolute;top:6px;right:6px}

/* ---------- Typo helpers ---------- */
.muted{color:var(--dim)}.dim2{color:var(--dim2)}.bold{font-weight:600}.sm{font-size:12px}.xs{font-size:11px}.big{font-size:22px;font-weight:600}
.row{display:flex;align-items:center;gap:8px}.between{display:flex;align-items:center;justify-content:space-between;gap:8px}
.col{display:flex;flex-direction:column;gap:6px}.grow{flex:1}.right{text-align:right}.center{text-align:center}
.accent{color:var(--accent)}.green{color:var(--green)}.red{color:var(--red)}
.divider{height:1px;background:var(--line);margin:2px 0}
.sec-label{display:flex;align-items:center;gap:10px;color:var(--dim);font-size:12px;margin:2px 0}
.sec-label::before,.sec-label::after{content:"";flex:1;height:1px;background:var(--line)}

/* ---------- Cards ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px}
.card.tight{padding:12px}
.list-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px;display:flex;flex-direction:column;gap:9px}
.kv{display:flex;justify-content:space-between;font-size:13px;gap:8px}
.kv .k{color:var(--dim)}
.info-banner{background:var(--blue-soft);border:1px solid rgba(59,130,246,.4);border-radius:12px;padding:11px 12px;font-size:12px;display:flex;gap:9px;color:#cfe0ff}

/* ---------- Buttons ---------- */
.btn{width:100%;padding:15px;border-radius:999px;font-weight:600;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--accent);color:#1a1200}
.btn-dark{background:var(--surface2);color:var(--text)}
.btn-outline{background:transparent;border:1.5px solid var(--accent);color:var(--accent)}
.btn-outline-dim{background:transparent;border:1.5px solid var(--line2);color:var(--text)}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{background:transparent;color:var(--dim)}
.btn.sm{padding:9px 14px;font-size:13px;width:auto}
.btn-green{background:var(--green);color:#04270f}
.foot-note{text-align:center;font-size:11px;color:var(--dim);margin-top:8px}

/* ---------- Chips / badges / tabs ---------- */
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:500}
.chip.on{background:var(--accent);color:#1a1200;border-color:var(--accent)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600}
.b-pending{background:var(--amber-soft);color:var(--amber)} .b-confirmed{background:var(--green-soft);color:var(--green)}
.b-cancel{background:var(--red-soft);color:var(--red)} .b-completed{background:var(--surface2);color:var(--dim)}
.b-event{background:var(--accent);color:#1a1200} .b-owl{background:var(--purple);color:#fff}
.b-seated{background:var(--blue-soft);color:var(--blue)} .b-paid{background:var(--green-soft);color:var(--green)}
.tabs{display:flex;border-bottom:1px solid var(--line);gap:4px}
.tab{flex:1;padding:12px 6px;text-align:center;font-size:14px;font-weight:600;color:var(--dim);position:relative}
.tab.on{color:var(--text)}
.tab.on::after{content:"";position:absolute;left:12%;right:12%;bottom:-1px;height:2px;background:var(--accent);border-radius:2px}
.pills{display:flex;gap:8px;overflow:auto}

/* ---------- Date strip ---------- */
.datestrip{display:flex;gap:8px;overflow:auto;padding-bottom:2px}
.dc{flex:none;width:58px;background:var(--surface);border:1.5px solid transparent;border-radius:14px;padding:9px 4px;text-align:center}
.dc .d{font-size:11px;color:var(--dim)} .dc .n{font-size:19px;font-weight:600;margin:2px 0}
.dc .tg{font-size:9px;color:var(--dim);font-weight:600}
.dc.sel{border-color:var(--accent)} .dc.sel .n,.dc.sel .d{color:var(--accent)}
.dc.ev .tg{background:var(--accent);color:#1a1200;border-radius:5px;padding:1px 4px;display:inline-block}
.dc.off{opacity:.4}

/* ---------- Steppers / slots ---------- */
.stepper{display:flex;align-items:center;justify-content:space-between}
.stp-btn{width:44px;height:44px;border-radius:50%;background:var(--surface2);display:grid;place-items:center}
.stp-val{font-size:22px;font-weight:600}
.stepper.mini .stp-btn{width:30px;height:30px}.stepper.mini .stp-val{font-size:15px;min-width:26px;text-align:center}
.stepper.mini{gap:6px;background:#fff;border-radius:999px;padding:3px;color:#111}
.stepper.mini .stp-btn{background:transparent;color:#111}
.slotgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.slot{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center}
.slot .t{font-size:14px;font-weight:600}.slot .s{font-size:10px;margin-top:2px}
.slot.sel{background:var(--accent);color:#1a1200;border-color:var(--accent)}.slot.sel .s{color:#5a3a00}
.slot.off{opacity:.35}
.s-low{color:var(--green)}.s-mod{color:var(--amber)}.s-busy{color:var(--accent)}.s-high{color:var(--red)}.s-sold{color:var(--dim2)}
.legend{display:flex;flex-wrap:wrap;gap:10px;font-size:10.5px;color:var(--dim)}
.legend i{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}

/* ---------- Stat tiles ---------- */
.tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.tiles.two{grid-template-columns:1fr 1fr}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px}
.tile .l{font-size:11px;color:var(--dim)}.tile .v{font-size:22px;font-weight:600;margin-top:2px}
.tile .sub2{font-size:10px;color:var(--dim2)}
.tile.acc{border-left:3px solid var(--accent)} .tile.b{border-left:3px solid var(--blue)}
.tile.g{border-left:3px solid var(--green)} .tile.r{border-left:3px solid var(--red)}

/* ---------- Table grid (merchant) ---------- */
.tblgrid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.tbl{background:var(--surface);border:1.5px solid var(--line);border-radius:11px;padding:8px 6px;text-align:center;position:relative}
.tbl .id{font-size:14px;font-weight:600}.tbl .c{font-size:9px;color:var(--dim)}
.tbl .st{font-size:9px;margin-top:4px;border-radius:5px;padding:1px 4px;display:inline-block;font-weight:600}
.tbl.confirmed{border-color:var(--green)} .tbl.confirmed .st{background:var(--green-soft);color:var(--green)}
.tbl.seated{border-color:var(--blue)} .tbl.seated .st{background:var(--blue-soft);color:var(--blue)}
.tbl.pending{border-color:var(--amber)} .tbl.pending .st{background:var(--amber-soft);color:var(--amber)}
.tbl.noshow{border-color:var(--red)} .tbl.noshow .st{background:var(--red-soft);color:var(--red)}
.tbl.vacant{opacity:.5} .tbl.blocked{opacity:.5;border-style:dashed}

/* ---------- Inputs ---------- */
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;color:var(--dim)}
.input,.textarea,.selectx{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px;color:var(--text);font-family:inherit;font-size:14px;width:100%}
.textarea{min-height:64px;resize:none}
.toggle{width:46px;height:27px;border-radius:999px;background:var(--surface2);position:relative;flex:none;transition:.2s}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s}
.toggle.on{background:var(--green)}.toggle.on::after{left:22px}

/* ---------- Sheet ---------- */
.sheet-layer{position:absolute;inset:0;z-index:40;display:none}
.sheet-layer.open{display:block}
.sheet-ov{position:absolute;inset:0;background:rgba(0,0,0,.55)}
.sheet{position:absolute;left:0;right:0;bottom:0;max-height:88%;overflow:auto;background:var(--bg2);border-top-left-radius:24px;border-top-right-radius:24px;border-top:1px solid var(--line);padding:16px;display:flex;flex-direction:column;gap:13px;transform:translateY(100%);transition:.28s}
.sheet-layer.open .sheet{transform:translateY(0)}
.grab{width:42px;height:4px;border-radius:2px;background:var(--line2);margin:0 auto 4px}

/* ---------- Misc components ---------- */
.hero{border-radius:var(--r);overflow:hidden;position:relative;background:linear-gradient(160deg,#3a1e5c,#7b2d86 45%,#c23b6a);min-height:210px;display:flex;align-items:flex-end;padding:14px}
.hero.lounge{background:linear-gradient(160deg,#1b2a4a,#2b5c7b)}
.hero-cap{background:rgba(0,0,0,.5);backdrop-filter:blur(4px);border-radius:12px;padding:10px 12px;width:100%}
.venue-ic{width:44px;height:44px;border-radius:11px;background:linear-gradient(140deg,#3a1e5c,#c23b6a);flex:none;display:grid;place-items:center;font-size:18px}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(140deg,#555,#999);flex:none;overflow:hidden;display:grid;place-items:center;font-size:14px;font-weight:600;color:#fff}
.qa{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.qa .qi{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px 4px;text-align:center;font-size:10.5px;color:var(--dim);display:flex;flex-direction:column;gap:6px;align-items:center}
.qa .qi .ci{width:34px;height:34px;border-radius:10px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center}
.alert{display:flex;gap:10px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:11px}
.alert .ci{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:none}
.timeline{position:relative;padding-left:18px}
.tl{position:relative;padding-bottom:14px;font-size:12px}
.tl::before{content:"";position:absolute;left:-13px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--accent)}
.tl::after{content:"";position:absolute;left:-9px;top:12px;bottom:0;width:1px;background:var(--line)}
.tl:last-child::after{display:none}
.tl.mute::before{background:var(--line2)}
.fab{position:absolute;right:16px;bottom:20px;background:var(--accent);color:#1a1200;border-radius:999px;padding:13px 18px;font-weight:600;display:flex;gap:8px;align-items:center;box-shadow:0 8px 24px rgba(245,133,31,.4);z-index:6}
.qr{width:130px;height:130px;background:#fff;border-radius:12px;padding:8px}
.crowd-tag{font-size:10px;font-weight:600}
.ticket-ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex:none}
.timeline-row{display:flex;gap:10px;font-size:12px;padding:9px 0;border-bottom:1px solid var(--line)}
.timeline-row .tm{width:44px;color:var(--dim);flex:none}
.empty{text-align:center;padding:26px 14px;color:var(--dim);display:flex;flex-direction:column;gap:8px;align-items:center}
.empty .big-ic{width:54px;height:54px;border-radius:16px;background:var(--surface2);display:grid;place-items:center;color:var(--dim2)}
@media(max-width:1040px){.app{flex-direction:column;align-items:center}.sidebar{width:390px;position:static;max-height:none}}

/* ===== polish · make-interfaces-feel-better ===== */
body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
h1,h2,.big,.apphdr h1{text-wrap:balance}
.muted,.foot-note,.xs,.sm{text-wrap:pretty}
.big,.tile .v,.tile .l,.stp-val,#tkTotal,#tkCount,.kv,.badge,.dc .n,.tbl .id{font-variant-numeric:tabular-nums}
.btn,.chip,.tile,.slot,.dc,.qi,.stp-btn,.icon-btn,.list-card,.tbl,.nav-item,.seg button,.add-btn,.alert,.card[onclick],[data-goto]{transition:scale .12s cubic-bezier(.2,0,0,1),background-color .16s ease,border-color .16s ease,color .16s ease,box-shadow .18s ease}
.btn:active,.chip:active,.tile:active,.slot:active,.dc:active,.qi:active,.stp-btn:active,.icon-btn:active,.list-card:active,.tbl:active,.seg button:active,.add-btn:active,.alert:active,.card[onclick]:active,[data-goto]:active{scale:.97}
.btn:active{scale:.96}
.card,.list-card,.tile,.alert{box-shadow:inset 0 1px 0 rgba(255,255,255,.03),0 4px 16px rgba(0,0,0,.32);border-color:rgba(255,255,255,.06)}
.btn-primary{box-shadow:0 6px 18px rgba(245,133,31,.32),inset 0 1px 0 rgba(255,255,255,.28)}
.chip.on,.add-btn.on{box-shadow:0 4px 14px rgba(245,133,31,.3)}
.slot.sel,.dc.sel{box-shadow:0 0 0 1px var(--accent),0 6px 16px rgba(245,133,31,.22)}
.toggle{transition:background-color .2s ease}
.toggle::after{transition:left .22s cubic-bezier(.2,0,0,1)}
.sheet{transition:transform .3s cubic-bezier(.2,0,0,1);will-change:transform;box-shadow:0 -14px 44px rgba(0,0,0,.55)}
.hero,.venue-ic,.venue-img,.avatar,.qr{outline:1px solid rgba(255,255,255,.1);outline-offset:-1px}
.icon-btn{width:40px;height:40px}
.stepper:not(.mini) .stp-btn{position:relative}
.stepper:not(.mini) .stp-btn::after{content:"";position:absolute;inset:-6px}
.filterbar{gap:8px;padding-bottom:2px}
.filterbar::-webkit-scrollbar{height:0}
.venue-card{padding:0;overflow:hidden}
/* stop flex from compacting content — let the body scroll instead */
.screen-body>*{flex-shrink:0}
.sheet>*{flex-shrink:0}
.venue-img,.hero,.tblgrid,.slotgrid,.datestrip{flex-shrink:0}
@keyframes enterUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
.screen.active>.apphdr{animation:enterUp .3s both cubic-bezier(.2,0,0,1)}
.screen.active .screen-body>*{animation:enterUp .34s both cubic-bezier(.2,0,0,1)}
.screen.active .screen-body>*:nth-child(2){animation-delay:.04s}
.screen.active .screen-body>*:nth-child(3){animation-delay:.08s}
.screen.active .screen-body>*:nth-child(4){animation-delay:.12s}
.screen.active .screen-body>*:nth-child(5){animation-delay:.16s}
.screen.active .screen-body>*:nth-child(6){animation-delay:.19s}
.screen.active .screen-body>*:nth-child(n+7){animation-delay:.22s}
.tabbed{display:flex;flex-direction:column;gap:12px}
.panel{display:none;flex-direction:column;gap:12px}
.panel.on{display:flex}
.toast{position:absolute;left:16px;right:16px;bottom:74px;background:var(--surface2);border:1px solid var(--line2);border-radius:12px;padding:12px 14px;font-size:13px;text-align:center;z-index:60;opacity:0;transform:translateY(10px);transition:opacity .25s ease,transform .25s ease;box-shadow:0 12px 30px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateY(0)}
.segcard{flex:1;background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:11px 12px;font-weight:600;font-size:13px;cursor:pointer;line-height:1.25;box-shadow:inset 0 1px 0 rgba(255,255,255,.03),0 4px 14px rgba(0,0,0,.3)}
.segcard.on{border-color:var(--accent);background:var(--accent-soft)}
.hybseg{display:flex;flex-direction:column;gap:14px}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important}}

/* ===== view toggle (grid / list / timeline) ===== */
.viewseg{display:flex;gap:5px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:4px}
.viewseg button{flex:1;padding:8px 6px;border-radius:999px;font-size:12px;font-weight:600;color:var(--dim);display:flex;gap:5px;align-items:center;justify-content:center}
.viewseg button.on{background:var(--accent);color:#1a1200;box-shadow:0 4px 12px rgba(245,133,31,.28)}

/* ===== resource timeline (google-calendar style) ===== */
.tl-wrap{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--bg2)}
.tl-scroll{overflow-x:auto;overflow-y:auto;max-height:none}
.tl-scroll::-webkit-scrollbar{height:8px;width:8px}.tl-scroll::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
.tl-grid{position:relative;font-variant-numeric:tabular-nums}
.tl-head{display:flex;position:sticky;top:0;background:var(--bg2);z-index:5;border-bottom:1px solid var(--line)}
.tl-corner{flex:none;position:sticky;left:0;background:var(--bg2);z-index:6;border-right:1px solid var(--line);display:flex;align-items:center;padding:9px 10px;font-size:11px;color:var(--dim);font-weight:600}
.tl-hours{display:flex}
.tl-h{flex:none;font-size:10.5px;color:var(--dim);padding:9px 0 9px 6px;border-left:1px solid var(--line);font-weight:600}
.tl-row{display:flex;position:relative;border-bottom:1px solid var(--line);height:48px}
.tl-row:last-child{border-bottom:none}
.tl-row:nth-child(even) .tl-lane{background:rgba(255,255,255,.012)}
.tl-name{flex:none;position:sticky;left:0;background:var(--bg2);z-index:4;border-right:1px solid var(--line);display:flex;flex-direction:column;justify-content:center;padding:0 10px}
.tl-name .n{font-size:12.5px;font-weight:600}.tl-name .c{font-size:9px;color:var(--dim)}
.tl-lane{position:relative}
.tl-lane .gl{position:absolute;top:0;bottom:0;width:1px;background:var(--line);opacity:.55}
.tl-b{position:absolute;top:5px;bottom:5px;border-radius:8px;padding:4px 8px;overflow:hidden;white-space:nowrap;color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 2px 8px rgba(0,0,0,.35);cursor:pointer}
.tl-b .who{font-size:10.5px;font-weight:600;line-height:1.1}.tl-b .mt{font-size:9px;opacity:.9;font-weight:500}
.tl-b.confirmed{background:linear-gradient(180deg,#33b765,#268a49)}
.tl-b.seated{background:linear-gradient(180deg,#4b8ef7,#2f6bd4)}
.tl-b.pending{background:linear-gradient(180deg,#e5951f,#bd7413);color:#1a1200}
.tl-b.event{background:linear-gradient(180deg,#b467f8,#8b3fd6)}
.tl-evline{position:absolute;top:0;bottom:0;border-left:2px dashed var(--purple);z-index:2;pointer-events:none}
.tl-evtag{position:sticky;top:0;z-index:6;display:inline-flex;gap:5px;align-items:center;font-size:10px;font-weight:600;color:var(--purple)}

/* ===== floors + floor map (table management) ===== */
.floor-card{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--surface)}
.floor-hd{display:flex;align-items:center;gap:11px;padding:13px 14px;cursor:pointer}
.floor-body{padding:0 12px 12px;display:flex;flex-direction:column;gap:10px}
.floormap{position:relative;height:200px;border-radius:12px;overflow:hidden;background-size:cover;background-position:center;outline:1px solid rgba(255,255,255,.08);outline-offset:-1px}
.fm-pin{position:absolute;transform:translate(-50%,-50%);min-width:36px;height:36px;padding:0 6px;border-radius:20px;background:rgba(18,18,22,.7);border:1.5px solid rgba(255,255,255,.55);display:grid;place-items:center;font-size:10.5px;font-weight:700;color:#fff;backdrop-filter:blur(2px)}
.fm-change{position:absolute;top:10px;left:10px;background:var(--accent);color:#1a1200;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:600;display:flex;gap:6px;align-items:center;box-shadow:0 4px 14px rgba(0,0,0,.4)}
.fm-hint{position:absolute;bottom:9px;left:0;right:0;text-align:center;font-size:10.5px;color:#fff;text-shadow:0 1px 4px #000;display:flex;gap:6px;align-items:center;justify-content:center}
.fm-expand{position:absolute;bottom:9px;right:11px;color:#fff;opacity:.9}
.chk{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line2);flex:none;display:grid;place-items:center;color:transparent}
.chk.on{background:var(--accent);border-color:var(--accent);color:#1a1200}
.tbl-lrow{display:flex;flex-direction:column;gap:8px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:11px 12px}

/* ===== tablet frame (landscape timeline) ===== */
.phone.tablet{aspect-ratio:3/2;height:min(760px,calc(100vh - 132px));width:auto;border-radius:38px;padding:7px}
.phone.tablet .device-screen{border-radius:31px}
.phone.tablet .island,.phone.tablet .home-ind{display:none}
.phone.tablet .screens{top:48px}
@media(max-width:1180px){.phone.tablet{max-width:calc(100vw - 40px)}}

/* ===== cursor affordance — clickable vs dead (for stakeholder demos) ===== */
.phone [onclick],.phone [data-goto],.phone [data-add],.btn,.chip,.tab,.nav-item,.seg button,.viewseg button,.stp-btn,.icon-btn,.qi,.add-btn,.toggle,.segcard,.tl-b,.floor-hd,.fm-change,.fm-expand,.chk,.dc:not(.off),.slot:not(.off),.selectx{cursor:pointer}
.card,.list-card,.tile,.kv,.info-banner,.legend,.sec-label,.divider,.empty,.hero,.venue-ic,.avatar,.qr,.stp-val,.badge,.tl-name,.tl-corner,.tl-h,.field label,.foot-note,.hint{cursor:default}
.card[onclick],.list-card[onclick],.tile[onclick],.alert[onclick],.badge[onclick]{cursor:pointer}
.slot.off,.dc.off,.tbl.vacant,.tbl.blocked,button[disabled],[data-dead]{cursor:not-allowed}
.input,.textarea{cursor:text}
/* dead controls read as non-interactive so no one clicks a placeholder */
.slot.off,.dc.off,.tbl.vacant{opacity:.4}

/* ===== stakeholder explainer panel (right rail) ===== */
.explain{width:340px;flex:none;position:sticky;top:22px;max-height:calc(100vh - 44px);overflow:auto;background:var(--bg2);border:1px solid var(--line);border-radius:18px;padding:20px}
.explain::-webkit-scrollbar{width:0}
.explain .role{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--accent);margin-bottom:9px}
.explain .role i{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block}
.explain h3{font-size:17px;margin:0 0 8px;line-height:1.25}
.explain .desc{font-size:13px;color:var(--dim);line-height:1.55;margin-bottom:6px}
.explain .lbl{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--dim2);font-weight:700;margin:18px 0 9px}
.explain ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px}
.explain li{font-size:12.5px;color:var(--text);line-height:1.5;display:flex;gap:9px;align-items:flex-start}
.explain li::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent-2);margin-top:6px;flex:none}
.explain li b{color:var(--accent-2);font-weight:600}
.explain .tip{margin-top:18px;background:var(--accent-soft);border:1px solid rgba(245,133,31,.28);border-radius:12px;padding:12px 13px;font-size:11.5px;color:var(--accent-2);line-height:1.5}
.explain .lg{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.explain .lg span{font-size:10.5px;color:var(--dim);display:inline-flex;align-items:center;gap:5px}
.explain .lg i{width:9px;height:9px;border-radius:3px;display:inline-block}
@media(max-width:1300px){.explain{position:static;width:428px;max-height:none}}

/* ================= MOBILE — full-bleed app + drawer nav (no device frame) ================= */
.mnav{display:none}
.drawer-ov{display:none}
@media(max-width:760px){
  html,body{overflow-x:hidden}
  .app{flex-direction:column;align-items:stretch;padding:0;gap:0;min-height:100dvh}
  .mnav{display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:60;height:56px;padding:0 12px;background:rgba(10,10,12,.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .mnav-btn{flex:none;display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--text);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:8px 13px;cursor:pointer}
  .mnav-btn:active{scale:.96}
  .mnav-title{flex:1;min-width:0;text-align:center;font-size:13px;font-weight:600;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stage{width:100%;flex:1;gap:0}
  .stage .scrn-name,.stage .hint{display:none}
  .phone,.phone.tablet{width:100%;height:calc(100dvh - 56px);max-width:none;max-height:none;aspect-ratio:auto;border:none;border-radius:0;padding:0;background:none;box-shadow:none}
  .phone .device-screen,.phone.tablet .device-screen{border-radius:0;box-shadow:none}
  .phone .island,.phone .home-ind,.phone .statusbar{display:none}
  .phone .screens,.phone.tablet .screens{top:0}
  /* right drawer = page list */
  .sidebar{position:fixed;top:0;right:0;bottom:0;left:auto;width:86%;max-width:360px;height:100dvh;max-height:100dvh;margin:0;border:none;border-left:1px solid var(--line);border-radius:0;overflow-x:hidden;overflow-y:auto;transform:translateX(101%);transition:transform .3s cubic-bezier(.2,0,0,1);z-index:85;box-shadow:-16px 0 44px rgba(0,0,0,.55)}
  .sidebar.open{transform:translateX(0)}
  .sidebar .nav-item{white-space:normal}
  /* left drawer = info / explainer */
  .explain{position:fixed;top:0;left:0;bottom:0;right:auto;width:86%;max-width:360px;height:100dvh;max-height:100dvh;margin:0;border:none;border-right:1px solid var(--line);border-radius:0;overflow-x:hidden;overflow-y:auto;transform:translateX(-101%);transition:transform .3s cubic-bezier(.2,0,0,1);z-index:85;box-shadow:16px 0 44px rgba(0,0,0,.55)}
  .explain.open{transform:translateX(0)}
  .drawer-ov{display:block;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:80;opacity:0;pointer-events:none;transition:opacity .25s}
  .drawer-ov.show{opacity:1;pointer-events:auto}
}
</style>

<script>
/* ============================================================
   REUSABLE MARKUP HELPERS
   ============================================================ */
const ic = (n,c="")=>`<svg class="ic ${c}"><use href="#i-${n}"/></svg>`;
const hdr = (title,sub="",right="",back=true)=>`
  <div class="apphdr">
    ${back?`<button class="icon-btn" onclick="back()">${ic('back')}</button>`:''}
    <div><h1>${title}</h1>${sub?`<div class="sub">${sub}</div>`:''}</div>
    ${right?`<div class="push">${right}</div>`:''}
  </div>`;
const dateStrip = (sel=0)=>{
  const days=[["Sun","24","Regular"],["Mon","25","Regular"],["Tue","26","Event"],["Wed","27","Regular"],["Thu","28","Regular"]];
  return `<div class="datestrip"><div class="dc" style="width:34px;display:grid;place-items:center;color:var(--dim)">Dec</div>${
    days.map((d,i)=>`<div class="dc ${i===sel?'sel':''} ${d[2]==='Event'?'ev':''}"><div class="d">${d[0]}</div><div class="n">${d[1]}</div><div class="tg">${d[2]}</div></div>`).join('')}</div>`;
};
const venueRow = (v=D.venue,badge="")=>`
  <div class="row"><div class="venue-ic">🎧</div><div class="grow"><div class="bold">${v.name}</div><div class="sm muted">${v.area}</div></div>${badge}</div>`;

/* ------- SCREEN BUILDERS (return inner HTML of .screen-body/footer) ------- */
/* ============ LIVE AVAILABILITY ENGINE (real computation) ============ */
const ENGINE = {
  rules:{ turnMin:90, bufferMin:15, slotMin:30, openMin:1080, closeMin:1740, windowDays:7 },
  tables:[
    {id:'V-1',cap:4,cat:'VIP'},{id:'V-2',cap:4,cat:'VIP'},{id:'V-3',cap:6,cat:'VIP'},{id:'V-4',cap:6,cat:'VIP'},
    {id:'T-5',cap:4,cat:'High'},{id:'T-6',cap:4,cat:'High'},{id:'R-1',cap:10,cat:'Rooftop'},{id:'R-2',cap:10,cat:'Rooftop',pub:false}
  ],
  events:[ {date:'2025-12-26',start:1260,name:'Neon Nights'} ],
  bookings:[
    {id:'b1',tableId:'V-2',date:'2025-12-26',start:1290,dur:120,party:2,status:'confirmed'},
    {id:'b2',tableId:'T-6',date:'2025-12-26',start:1260,dur:120,party:4,status:'confirmed'}
  ],
  overlaps:function(aS,aD,bS,bD){ var buf=this.rules.bufferMin; return aS < (bS+bD+buf) && bS < (aS+aD+buf); },
  eventBlocks:function(date,start,dur){ var e=this.events.find(function(ev){return ev.date===date}); if(!e)return false; return (start+dur+this.rules.bufferMin) > e.start; },
  tableBusy:function(id,date,start,dur){ return this.bookings.some(function(b){ return b.tableId===id && b.date===date && b.status!=='cancelled' && ENGINE.overlaps(start,dur,b.start,b.dur); }); },
  freeTables:function(date,start,dur,party){ return this.tables.filter(function(t){ return t.pub!==false && t.cap>=party && !ENGINE.tableBusy(t.id,date,start,dur); }); },
  slots:function(date,party,dur){ var out=[]; for(var m=this.rules.openMin;m+dur<=this.rules.closeMin;m+=this.rules.slotMin){ var ev=this.eventBlocks(date,m,dur); var f=ev?0:this.freeTables(date,m,dur,party).length; out.push({min:m,ok:!ev&&f>0,free:f,reason:ev?'event':(f?'':'full')}); } return out; },
  lock:function(b){ b.id='b'+(this.bookings.length+1); b.status='confirmed'; this.bookings.push(b); },
  fmt:function(m){ m=((m%1440)+1440)%1440; var h=Math.floor(m/60),mm=m%60,ap=h<12?'AM':'PM',h12=h%12||12; return h12+':'+(mm<10?'0':'')+mm+' '+ap; }
};
['V-1','V-2','T-5','T-6','R-1'].forEach(function(id){ ENGINE.bookings.push({tableId:id,date:'2025-12-24',start:1140,dur:90,party:3,status:'confirmed'}); });
function seeAlt(){ go('c1-fully-booked'); }
function barSlots(party){ return ENGINE.slots('2025-12-24',party,90).map(function(x){ var off=!x.ok; var label=off?(x.reason==='event'?'Event':'Sold out'):(x.free>4?'Available':x.free>2?'Filling':'Few left'); var cls=off?'s-sold':(x.free>4?'s-low':x.free>2?'s-mod':'s-high'); return '<div class="slot '+(off?'off':'')+'"><div class="t">'+ENGINE.fmt(x.min)+'</div><div class="s '+cls+'">'+label+'</div></div>'; }).join(''); }
function refreshBarSlots(){ var stp=document.querySelector('#c1-entry-reg .stepper[data-party]'); var party=stp?(parseInt(stp.querySelector('.stp-val').textContent)||3):3; var grid=document.getElementById('barSlots'); if(grid) grid.innerHTML=barSlots(party); var any=ENGINE.slots('2025-12-24',party,90).some(function(x){return x.ok}); var note=document.getElementById('availNote'); if(note) note.textContent=ENGINE.freeTables('2025-12-24',1140,90,party).length+' free @ 7 PM'; var full=document.getElementById('barFull'); if(full) full.innerHTML=any?'':('<div class="info-banner" style="background:var(--red-soft);border-color:rgba(255,77,79,.4);color:#ffb3b4">'+ic('alert','sm')+'<div>No table fits '+party+' guests on this date. <span class="accent" style="cursor:pointer" onclick="seeAlt()">See alternatives</span></div></div>'); }
var ASSIGN_SEL=[];
function toggleAssign(el){ var id=el.dataset.tid,i=ASSIGN_SEL.indexOf(id); if(i>-1){ASSIGN_SEL.splice(i,1);el.classList.remove('sel');el.style.borderColor='';}else{ASSIGN_SEL.push(id);el.classList.add('sel');el.style.borderColor='var(--accent)';} var b=document.getElementById('assignSel'); if(b)b.textContent=ASSIGN_SEL.length?ASSIGN_SEL.join(', '):'none'; }
function assignLock(){ if(!ASSIGN_SEL.length){toast('Pick a table first');return;} ASSIGN_SEL.forEach(function(id){ ENGINE.lock({tableId:id,date:'2025-12-26',start:1260,dur:120,party:3}); }); toast('Assigned '+ASSIGN_SEL.join(', ')+' — locked 9:00–11:00 PM'); ASSIGN_SEL=[]; closeSheet(); }
function toast(msg){ var t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.querySelector('.phone').appendChild(t); setTimeout(function(){t.classList.add('show')},10); setTimeout(function(){t.classList.remove('show');setTimeout(function(){t.remove()},300)},2400); }
var CUR={name:'Skyline Lounge',area:'Tsim Sha Tsui'};
function hybSeg(el){ el.parentElement.querySelectorAll('.segcard').forEach(function(c){c.classList.remove('on')}); el.classList.add('on'); var seg=el.dataset.seg; document.querySelectorAll('#segday,#segnight').forEach(function(d){ d.style.display=(d.id==='seg'+seg)?'flex':'none'; }); }
function dayPref(el,show){ pickChip(el); var t=document.getElementById('dayTables'); if(t) t.style.display=show?'flex':'none'; }
function dayTableList(){ return ENGINE.tables.filter(function(t){return t.pub!==false}).slice(0,6).map(function(t){ return '<div class="card tight between selrow" data-tid="'+t.id+'" onclick="pickTable(this)" style="cursor:pointer"><div><div class="bold sm">'+t.id+' · '+t.cat+'</div><div class="xs muted">Seats '+t.cap+' · available for your slot</div></div><span class="xs green">Pick</span></div>'; }).join(''); }
function pickTable(el){ el.parentElement.querySelectorAll('.selrow').forEach(function(x){x.classList.remove('sel');x.style.borderColor='';}); el.classList.add('sel'); el.style.borderColor='var(--accent)'; }

const SB = {};

/* ---------- HOME / DISCOVER (venue selection) ---------- */
const VENUES=[
 {id:"boomerang",name:"Boomerang Club",tags:["Club"],area:"Central",rating:"4.8",meta:"Live DJ · Open till 5 AM",event:true,grad:"linear-gradient(140deg,#3a1e5c,#c23b6a)"},
 {id:"qura",name:"Qura Bar",tags:["Bar","Restaurant"],area:"Central",rating:"4.6",meta:"Cocktails · Open till 2 AM",grad:"linear-gradient(140deg,#1b2a4a,#2b5c7b)"},
 {id:"skyline",name:"Skyline Lounge",tags:["Lounge","Bar"],area:"Tsim Sha Tsui",rating:"4.7",meta:"Rooftop · Open till 1 AM",grad:"linear-gradient(140deg,#2a2140,#7b4b86)"},
 {id:"neon",name:"Neon Room",tags:["Club"],area:"Wan Chai",rating:"4.5",meta:"Techno nights · Open till 4 AM",event:true,grad:"linear-gradient(140deg,#101a3a,#3a2a6a)"},
 {id:"terrace",name:"The Terrace",tags:["Rooftop","Bar"],area:"Central",rating:"4.4",meta:"Sunset views · Open till 12 AM",grad:"linear-gradient(140deg,#123524,#256b4a)"},
];
const venueCard=(v)=>`
  <div class="venue-card list-card" data-name="${v.name.toLowerCase()}" data-tags="${v.tags.join(',')}${v.event?',Event':''}" onclick="openVenue('${v.id}')" style="gap:0">
    <div class="venue-img" style="height:118px;background:${v.grad};position:relative">${v.event?`<span class="badge b-event" style="position:absolute;top:10px;left:10px">Event Tonight</span>`:''}<span class="badge" style="position:absolute;top:10px;right:10px;background:rgba(0,0,0,.55);color:#fff">${ic('star','sm')} ${v.rating}</span></div>
    <div style="padding:12px;display:flex;flex-direction:column;gap:7px">
      <div class="between"><div class="bold">${v.name}</div><span class="xs muted">${ic('loc','sm')} ${v.area}</span></div>
      <div class="row" style="flex-wrap:wrap;gap:6px">${v.tags.map(t=>`<span class="chip" style="padding:3px 10px;font-size:11px">${t}</span>`).join('')}</div>
      <div class="between"><span class="xs muted">${v.meta}</span><span class="accent sm">Book ${ic('fwd','sm')}</span></div>
    </div>
  </div>`;
function openVenue(id){ var v=VENUES.find(function(x){return x.id===id}); if(!v){go2('c1-entry-reg');return;} CUR={name:v.name,area:v.area}; if(v.event){go2('c1-entry-evt');return;} var club=v.tags.some(function(t){return t==='Club'||t==='Lounge'}); go2(club?'c1-hybrid':'c1-entry-reg'); }
function filterVenues(chip){ chip.parentElement.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on')}); chip.classList.add('on'); var t=chip.dataset.vtype; document.querySelectorAll('#home .venue-card').forEach(function(v){ v.style.display=(t==='all'||(v.dataset.tags||'').indexOf(t)>-1)?'':'none'; }); updateVenueCount(); }
function searchVenues(inp){ var q=inp.value.toLowerCase(); document.querySelectorAll('#home .venue-card').forEach(function(v){ v.style.display=(v.dataset.name||'').indexOf(q)>-1?'':'none'; }); updateVenueCount(); }
function updateVenueCount(){ var n=[].slice.call(document.querySelectorAll('#home .venue-card')).filter(function(v){return v.style.display!=='none'}).length; var el=document.querySelector('#venueCount'); if(el)el.textContent=n+' venue'+(n===1?'':'s'); }
function filt(chip){ var bar=chip.closest('.filterbar'); bar.querySelectorAll('.chip[data-filter]').forEach(function(c){c.classList.remove('on')}); chip.classList.add('on'); var key=chip.dataset.filter; var scope=document.querySelector(bar.dataset.target); if(!scope)return; scope.querySelectorAll('[data-cat]').forEach(function(x){ x.style.display=(key==='all'||x.dataset.cat===key)?'':'none'; }); }
function searchList(inp,sel){ var q=inp.value.toLowerCase(); document.querySelectorAll(sel).forEach(function(x){ x.style.display=(x.dataset.name||'').indexOf(q)>-1?'':'none'; }); }
SB["home"]=()=>`
<div class="apphdr"><div class="venue-ic" style="background:linear-gradient(140deg,var(--accent),#ffd24a);color:#1a1200;font-weight:700">M</div><div class="grow"><h1 style="font-size:18px">Mandos</h1><div class="sub">${ic('loc','sm')} Central, Hong Kong</div></div><button class="icon-btn bg" style="position:relative">${ic('bell','sm')}<span class="dot"></span></button></div>
<div class="screen-body">

const liveDateStrip=(sel,handler)=>{

function evtDayView(){ return `
  <div class="tabs"><div class="tab on" data-goto="c2-club">Tables</div><div class="tab" data-goto="c2-tickets">Tickets</div></div>

function evtRegularView(label){ return `

  <div class="card"><div class="bold sm" style="margin-bottom:8px">Guests</div>${stepper(3)}</div>
  <div class="card"><div class="bold sm" style="margin-bottom:8px">Duration</div><div class="chipsel row"><span class="chip on" onclick="pickChip(this)">1.5 hours</span><span class="chip" onclick="pickChip(this)">2 hours</span><span class="chip" onclick="pickChip(this)">3 hours</span></div></div>
  <button class="btn btn-primary" onclick="go('c3-summary-free')">Continue · Book for Free</button>

function evtDate(el){

function buildDate(el){

}

SB["m3-assign"]=function(){ ASSIGN_SEL=[];
  var date='2025-12-26',start=1260,dur=120,party=3;
  var pub=ENGINE.tables.filter(function(t){return t.pub!==false});
  var avail=ENGINE.freeTables(date,start,dur,party).length;
  var cells=pub.map(function(t){ var fits=t.cap>=party,busy=ENGINE.tableBusy(t.id,date,start,dur),free=fits&&!busy;
    var st=!fits?'Too small':busy?'Reserved':'Available',col=!fits?'muted':busy?'red':'green';
    return '<div class="tbl" data-tid="'+t.id+'" '+(free?'onclick="toggleAssign(this)" style="cursor:pointer;text-align:left;padding:9px"':'style="text-align:left;padding:9px;opacity:.45"')+'><div class="bold sm">'+t.id+'</div><div class="xs muted">'+t.cat+' · '+t.cap+' seats</div><div class="xs '+col+'">'+st+'</div></div>'; }).join('');
  return '<div class="grab"></div>'
   +'<div class="between"><div class="bold" style="font-size:17px">Assign Table</div><button class="icon-btn" onclick="closeSheet()">'+ic('x')+'</button></div>'
   +'<div class="card tight"><div class="between sm"><span>'+ic('clock','sm')+' Fri 26 Dec · 9:00 PM</span><span>'+ic('users','sm')+' 3 guests · 2 hrs</span></div></div>'
   +'<div class="between"><div class="bold sm">Select Table(s)</div><span class="xs green">'+avail+' of '+pub.length+' free (computed)</span></div>'
   +'<div class="tblgrid" style="grid-template-columns:1fr 1fr 1fr">'+cells+'</div>'
   +'<div class="info-banner">'+ic('info','sm')+'<div>Reserved = an overlapping booking exists (incl. 15-min buffer) — the engine blocks it. Assigning locks the table so it cannot be double-booked; reopen this sheet to watch it flip to Reserved.</div></div>'
   +'<div class="between sm"><span>Selected: <b id="assignSel">none</b></span></div>'
   +'<div class="row"><button class="btn btn-dark sm" onclick="closeSheet()">Cancel</button><button class="btn btn-primary sm" onclick="assignLock()">Assign &amp; lock</button></div>';
};
const assignTbl=(id,meta,ms,st,sel=false,mode="")=>`<div class="tbl ${mode==='res'?'pending':mode==='blk'?'blocked':''}" style="text-align:left;padding:9px;${sel?'border-color:var(--accent)':''}"><div class="between"><span class="bold sm">${id}</span>${sel?`<span class="accent">${ic('check','sm')}</span>`:''}</div><div class="xs muted">${meta}</div><div class="xs muted">Min ${ms}</div><div class="xs ${st==='Available'?'green':st==='Reserved'?'s-mod':'red'}">${st}</div></div>`;

const TL_ORIGIN=1080, TL_END=1620;              // 6:00 PM → 3:00 AM (next day)
const TL_EVENT=1380;                            // 11:00 PM · Neon Nights begins (session 3)
const TL_TABLES=[
  {id:'V-1',cat:'VIP',floor:'Floor 1'},{id:'V-2',cat:'VIP',floor:'Floor 1'},{id:'V-3',cat:'VIP',floor:'Floor 1'},
  {id:'T-1',cat:'High',floor:'Floor 1'},{id:'T-2',cat:'High',floor:'Floor 1'},
  {id:'B-2',cat:'Booth',floor:'Floor 2'},{id:'R-1',cat:'Rooftop',floor:'Floor 2'},{id:'R-2',cat:'Rooftop',floor:'Floor 2'}
];
const TL_BOOKINGS=[
  {tid:'V-1',who:'Mei Xiang',start:1260,dur:120,g:3,st:'confirmed'},
  {tid:'V-1',who:'Walk-in',start:1410,dur:120,g:2,st:'seated'},
  {tid:'V-2',who:'Neha K.',start:1290,dur:120,g:2,st:'pending'},
  {tid:'V-3',who:'Arjun Patel',start:1155,dur:120,g:4,st:'seated'},
  {tid:'T-1',who:'Lian Hua',start:1200,dur:120,g:3,st:'confirmed'},
  {tid:'T-2',who:'Lucas W.',start:1290,dur:90,g:2,st:'confirmed'},
  {tid:'B-2',who:'Jing Wei',start:1380,dur:150,g:6,st:'event'},
  {tid:'R-1',who:'Party Grp',start:1260,dur:180,g:8,st:'seated'}
];
function tlHM(m){ m=((m%1440)+1440)%1440; var h=Math.floor(m/60),ap=h<12?'AM':'PM',h12=h%12||12; return h12+' '+ap; }
function timelineHTML(hourPx,nameW){
  nameW=nameW||96;
  var span=TL_END-TL_ORIGIN, laneW=span/60*hourPx, hours=[];
  for(var m=TL_ORIGIN;m<TL_END;m+=60) hours.push(m);
  var evX=(TL_EVENT-TL_ORIGIN)/60*hourPx;
  var head='<div class="tl-head"><div class="tl-corner" style="width:'+nameW+'px">Table</div><div class="tl-hours">'+
    hours.map(function(m){return '<div class="tl-h" style="width:'+hourPx+'px">'+tlHM(m)+'</div>';}).join('')+'</div></div>';
  var rows=TL_TABLES.map(function(t){
    var bs=TL_BOOKINGS.filter(function(b){return b.tid===t.id;}).map(function(b){
      var left=(b.start-TL_ORIGIN)/60*hourPx, w=b.dur/60*hourPx-3;
      return '<div class="tl-b '+b.st+'" style="left:'+left+'px;width:'+w+'px" onclick="go(\'m2-detail\')"><div class="who">'+b.who+'</div><div class="mt">'+ENGINE.fmt(b.start)+' · '+b.g+'p</div></div>';
    }).join('');
    var gl=''; for(var i=1;i<hours.length;i++){ gl+='<div class="gl" style="left:'+(i*hourPx)+'px"></div>'; }
    return '<div class="tl-row"><div class="tl-name" style="width:'+nameW+'px"><div class="n">'+t.id+'</div><div class="c">'+t.cat+' · '+t.floor+'</div></div>'+
      '<div class="tl-lane" style="width:'+laneW+'px">'+gl+'<div class="tl-evline" style="left:'+evX+'px"></div>'+bs+'</div></div>';
  }).join('');
  return '<div class="tl-wrap"><div class="tl-scroll"><div class="tl-grid" style="min-width:'+(nameW+laneW)+'px">'+head+rows+'</div></div></div>';
}

function go(id){
  const meta=SCREENS.find(s=>s.id===id) || {t:''};
  // aliases (screens that reuse another body id)
  const bodyId = id==='c2-additional-club'?'c2-additional': id;
  if(id==='c2-additional-club'||id==='c2-additional'){ go('c2-club'); openSheet('c2-additional'); return; }
  if(id==='c2-additional-from'){ alert('Large-group enquiry flow (stub)'); return; }
  if(SHEETS[id] && SCREENS.find(s=>s.id===id&&s.sheet)){
    // sheet-type screen selected from nav → open its parent context then the sheet
    if(id==='m3-assign'){ ensure('m2-detail'); go2('m2-detail'); openSheet('m3-assign'); return; }
    if(id==='c2-additional'){ go2('c2-club'); openSheet('c2-additional'); return; }
  }
  go2(id);

function ensure(id){ if(!document.getElementById(id)) buildScreen(id); }
function buildScreen(id){
  const fn=SB[id]; if(!fn) return;
  const el=document.createElement('section'); el.className='screen'; el.id=id; el.innerHTML=fn();
  document.getElementById('screens').appendChild(el);
  el.querySelectorAll('.qr').forEach(makeQR);
  if(id==='c2-tickets') recalcTickets();
  if(id==='c2-club') recalcTables();
  if(id==='c1-entry-reg') refreshBarSlots();
}
function go2(id){
  closeSheet();                       // navigating always dismisses an open sheet
  ensure(id);
  const cur=document.querySelector('.screen.active');
  if(cur && cur.id!==id) history.push(cur.id);
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(id); if(!el) return;
  el.classList.add('active'); el.querySelector('.screen-body')?.scrollTo(0,0);
  document.querySelector('.phone')?.classList.toggle('tablet', id==='m2-timeline-tablet');
  const meta=SCREENS.find(s=>s.id===id)||SCREENS.find(s=>id.startsWith(s.id));
  document.getElementById('scrnName').textContent=meta?meta.t:id;
  const mt=document.getElementById('mnavTitle'); if(mt) mt.textContent=meta?meta.t:id;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  renderExplain(id);
  closeDrawers();
}
/* ---------- mobile drawers (info = left, pages = right) ---------- */
function drawerOv(on){ const o=document.getElementById('drawerOv'); if(o) o.classList.toggle('show',on); }
function openNav(){ document.querySelector('.sidebar')?.classList.add('open'); document.getElementById('explain')?.classList.remove('open'); drawerOv(true); }
function openInfo(){ document.getElementById('explain')?.classList.add('open'); document.querySelector('.sidebar')?.classList.remove('open'); drawerOv(true); }
function closeDrawers(){ document.querySelector('.sidebar')?.classList.remove('open'); document.getElementById('explain')?.classList.remove('open'); drawerOv(false); }
function back(){ const p=history.pop(); if(p) go2(p); }
function openSheet(id){ document.getElementById('sheetBox').innerHTML=(SHEETS[id]||(()=>'—'))(); document.getElementById('sheetLayer').classList.add('open'); if(INFO[id]) renderExplain(id); }
function closeSheet(){ const l=document.getElementById('sheetLayer'); if(l) l.classList.remove('open'); const a=document.querySelector('.screen.active'); if(a) renderExplain(a.id); }
function setMode(m){ mode=m; document.getElementById('segC').classList.toggle('on',m==='customer'); document.getElementById('segM').classList.toggle('on',m==='merchant'); renderNav(); history=[]; go2(m==='customer'?'home':'m3-dashboard'); }

/* fake QR generator */
function makeQR(el){
  const N=21; let seed=42; const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff};
  let r=`<svg viewBox="0 0 ${N} ${N}" width="100%" height="100%">`;
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){ const finder=(x<7&&y<7)||(x>=N-7&&y<7)||(x<7&&y>=N-7); if(finder)continue; if(rnd()>.55) r+=`<rect x="${x}" y="${y}" width="1" height="1" fill="#000"/>`; }
  [[0,0],[N-7,0],[0,N-7]].forEach(([fx,fy])=>{ r+=`<rect x="${fx}" y="${fy}" width="7" height="7" fill="#000"/><rect x="${fx+1}" y="${fy+1}" width="5" height="5" fill="#fff"/><rect x="${fx+2}" y="${fy+2}" width="3" height="3" fill="#000"/>`; });
  el.innerHTML=r+`</svg>`;
}

/* ---------- delegated interactions: make controls & flow clickable ---------- */
document.querySelector('.phone').addEventListener('click',function(e){
  const goEl=e.target.closest('[data-goto]');
  if(goEl){ if(goEl.classList.contains('tab')) setTab(goEl); go2(goEl.dataset.goto); return; }
  const stp=e.target.closest('.stp-btn'); if(stp){ step(stp); return; }
  const tog=e.target.closest('.toggle'); if(tog){ tog.classList.toggle('on'); return; }
  const segb=e.target.closest('.seg button');
  if(segb){ segb.parentElement.querySelectorAll('button').forEach(function(b){b.classList.remove('on');b.style.color='var(--dim)';b.style.fontWeight='400';}); segb.classList.add('on'); segb.style.color=''; segb.style.fontWeight='600'; return; }
  const addb=e.target.closest('[data-add]'); if(addb){ addb.classList.toggle('on'); addb.textContent=addb.classList.contains('on')?'Added':'+ Add'; recalcTables(); return; }
  const tab=e.target.closest('.tab'); if(tab && !tab.getAttribute('onclick')){ setTab(tab); if(tab.dataset.tab){ var box=tab.closest('.tabbed'); if(box) box.querySelectorAll('.panel').forEach(function(p){p.classList.toggle('on',p.dataset.panel===tab.dataset.tab)}); } return; }
  const dc=e.target.closest('.dc');
  if(dc && dc.closest('.datestrip') && !dc.classList.contains('off') && dc.querySelector('.n')){
    if(dc.getAttribute('onclick')) return;
    if(dc.classList.contains('ev')){ go2('c1-entry-evt'); return; }
    pick(dc,'.datestrip','.dc'); return; }
  const sl=e.target.closest('.slot'); if(sl && !sl.classList.contains('off')){ pick(sl,'.slotgrid','.slot'); return; }
});
function setTab(t){ t.parentElement.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on')}); t.classList.add('on'); }
function pick(el,scopeSel,itemSel){ const scope=el.closest(scopeSel)||el.parentElement; scope.querySelectorAll(itemSel).forEach(function(x){x.classList.remove('sel')}); el.classList.add('sel'); }
function step(btn){ const st=btn.closest('.stepper'); if(!st)return; const v=st.querySelector('.stp-val'); const plus=(btn.querySelector('use')&&btn.querySelector('use').getAttribute('href')||'').indexOf('plus')>-1; let n=parseInt((v.textContent||'').replace(/\D/g,''))||0; const mini=st.classList.contains('mini'); const min=st.dataset.min!==undefined?+st.dataset.min:(mini?0:1); const max=st.dataset.max!==undefined?+st.dataset.max:30; n=plus?Math.min(max,n+1):Math.max(min,n-1); v.textContent=n; if(st.dataset.price) recalcTickets(); if(st.dataset.party) refreshBarSlots(); }
function recalcTickets(){ let tot=0,cnt=0; document.querySelectorAll('#c2-tickets .stepper[data-price]').forEach(function(st){var q=parseInt(st.querySelector('.stp-val').textContent)||0; tot+=q*(+st.dataset.price); cnt+=q;}); var T=document.querySelector('#tkTotal'),C=document.querySelector('#tkCount'); if(T)T.textContent='HK$'+tot; if(C)C.textContent=cnt+' Tickets'; }
function recalcTables(){ var ids=[].slice.call(document.querySelectorAll('#c2-club [data-add].on')).map(function(b){return b.dataset.add}); var c=document.querySelector('#tblBarCount'),l=document.querySelector('#tblBarList'); if(c)c.textContent=ids.length+' table'+(ids.length===1?'':'s')+' added'; if(l)l.textContent=ids.length?ids.join(', '):'None selected'; }

renderNav();
go2('home');
</script>
