<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mandos · Web Ticketing (design spec)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   MANDOS WEB · design-spec implementation
   serif editorial display · blur-footer poster cards · floating dock
   ============================================================ */
:root{
  --bg:#070403; --bg2:#0d0908; --surface:#151011; --surface2:#1e1719; --line:rgba(255,255,255,.09); --line2:rgba(255,255,255,.16);
  --text:#f5f2ef; --dim:#a99f9a; --dim2:#6f6662;
  --orange:#f5851f; --ember:#c9330a; --grad:linear-gradient(135deg,#ff8a2e,#e04a0e 60%,#c9330a);
  --green:#4ade80; --purple:#c084fc; --amber:#fbbf24; --red:#ff5a4f;
  --serif:'Instrument Serif',Georgia,serif; --sans:'Inter',system-ui,sans-serif; --mono:'Space Mono',monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{overflow-x:clip}
body{margin:0;overflow-x:clip;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-variant-numeric:tabular-nums}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(1100px 460px at 50% -8%,rgba(150,32,6,.42),transparent 70%);pointer-events:none;z-index:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
h1,h2,h3{margin:0;font-weight:700;letter-spacing:-.02em;text-wrap:balance}
.ic{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;display:inline-block;flex:none;vertical-align:-3px}
.ic.sm{width:15px;height:15px}.ic.lg{width:24px;height:24px}
.muted{color:var(--dim)}.dim2{color:var(--dim2)}.bold{font-weight:600}.b7{font-weight:700}
.row{display:flex;align-items:center;gap:10px}.between{display:flex;align-items:center;justify-content:space-between;gap:12px}
.col{display:flex;flex-direction:column}.grow{flex:1;min-width:0}.right{text-align:right}.wrap{flex-wrap:wrap}
.mono{font-family:var(--mono)}
.serif{font-family:var(--serif);font-weight:400;letter-spacing:0}

/* ---------- prototype navigator (left rail — harness, not product) ---------- */
.app{display:flex;min-height:100vh;position:relative;z-index:1}
.nav{width:224px;flex:none;position:sticky;top:0;height:100vh;overflow:auto;background:rgba(10,7,6,.9);border-right:1px solid var(--line);padding:16px 12px;z-index:90}
.nav::-webkit-scrollbar{width:0}
.brand{display:flex;align-items:center;gap:9px;padding:4px 6px 2px}
.brand .logo{width:26px;height:26px;border-radius:8px;background:var(--grad);display:grid;place-items:center;font-weight:800;font-size:14px;color:#fff}
.brand b{font-size:14px;letter-spacing:.08em}
.brand .sub{font-size:10px;color:var(--dim2)}
.modeseg{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:4px;margin:14px 2px}
.modeseg button{flex:1;padding:7px 2px;border-radius:999px;font-size:11px;font-weight:600;color:var(--dim)}
.modeseg button.on{background:var(--grad);color:#fff}
.navgrp{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim2);font-weight:700;margin:16px 8px 6px}
.navitem{display:flex;gap:9px;align-items:center;width:100%;text-align:left;padding:9px 10px;border-radius:9px;font-size:12.5px;color:var(--dim);margin-bottom:2px}
.navitem:hover{background:var(--surface)}
.navitem.on{background:rgba(245,133,31,.12);color:var(--text)}
.navitem .tg{margin-left:auto;font-size:8.5px;border:1px solid var(--line2);border-radius:5px;padding:1px 5px;color:var(--dim2)}
.canvas{flex:1;min-width:0}
.hintline{padding:12px 24px 90px;font-size:11.5px;color:var(--dim2);text-align:center}

/* ---------- product top nav ---------- */
.pnav{position:sticky;top:0;z-index:60;display:flex;align-items:center;gap:18px;padding:16px 34px;background:linear-gradient(rgba(7,4,3,.92),rgba(7,4,3,.75) 70%,transparent);backdrop-filter:blur(10px)}
.wordmark{font-weight:800;letter-spacing:.18em;font-size:16px}
.pillnav{display:flex;align-items:center;background:rgba(20,14,12,.75);border:1px solid var(--line);border-radius:999px;padding:4px;margin:0 auto}
.pn{display:flex;align-items:center;gap:6px;padding:9px 16px;font-size:13px;color:var(--dim);border-radius:999px;cursor:pointer;white-space:nowrap}
.pn:hover{color:var(--text)}
.pn+.pn{border-left:1px solid var(--line)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:999px;font-weight:600;font-size:13.5px;transition:transform .1s,opacity .15s,box-shadow .2s;white-space:nowrap}
.btn:active{transform:translateY(1px)}
.btn-white{background:#fff;color:#0c0806}
.btn-white:hover{opacity:.92}
.btn-ghostp{border:1px solid var(--line2);color:var(--text);background:rgba(255,255,255,.04)}
.btn-grad{background:var(--grad);color:#fff;box-shadow:0 10px 26px -8px rgba(224,74,14,.55)}
.btn-dark{background:rgba(255,255,255,.07);border:1px solid var(--line);color:var(--text)}
.btn.lg{padding:15px 28px;font-size:15px;border-radius:14px}
.btn.block{width:100%}

/* ---------- floating bottom dock ---------- */
.dock{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);display:flex;align-items:center;gap:4px;background:rgba(14,9,8,.88);border:1px solid var(--line2);border-radius:999px;padding:5px;backdrop-filter:blur(18px);z-index:80;box-shadow:0 18px 50px rgba(0,0,0,.6)}
.dock .dpill{display:flex;align-items:center;gap:8px;padding:11px 20px;border-radius:999px;font-weight:600;font-size:13.5px;background:var(--grad);color:#fff}
.dock .dic{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;color:#cfc7c2}
.dock .dic:hover{background:rgba(255,255,255,.07);color:#fff}
.dock .dic.on{background:rgba(255,255,255,.1);color:#fff}
.dock .dic.dis{opacity:.38;cursor:not-allowed}
.dock .dic.dis:hover{background:none;color:#cfc7c2}

/* ---------- page scaffolding ---------- */
.page{padding:0 34px 40px;max-width:1380px;margin:0 auto;width:100%}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);font-weight:700}
.sechead{display:flex;align-items:baseline;gap:10px;margin:34px 0 18px;font-size:26px;font-weight:700}
.sechead .lite{color:var(--dim);font-weight:500}
.sechead .arrow{color:var(--dim);font-size:18px}

/* ---------- hero ---------- */
.hero{position:relative;min-height:430px;display:flex;align-items:center;justify-content:center;text-align:center;border-radius:0 0 28px 28px;overflow:hidden;margin:0 -34px}
.hero .bgimg{position:absolute;inset:0;background-size:cover;background-position:center 30%;filter:blur(14px) brightness(.5) saturate(1.15);transform:scale(1.08)}
.hero .tint{position:absolute;inset:0;background:linear-gradient(rgba(7,4,3,.25),rgba(7,4,3,.55) 60%,var(--bg))}
.hero h1{position:relative;font-family:var(--serif);font-weight:400;font-size:clamp(38px,5.2vw,68px);line-height:1.08;letter-spacing:0;max-width:900px;padding:0 20px}
.hero h1 em{font-style:italic}

/* ---------- poster cards (blur footer = backdrop blur of the artwork) ---------- */
.pcard{position:relative;border-radius:18px;overflow:hidden;background-size:cover;background-position:center;cursor:pointer;isolation:isolate;outline:1px solid rgba(255,255,255,.07);outline-offset:-1px;transition:transform .18s,box-shadow .18s}
.pcard:hover{transform:translateY(-4px);box-shadow:0 24px 60px -18px rgba(0,0,0,.8)}
.pcard .pfoot{position:absolute;left:0;right:0;bottom:0;padding:13px 15px 14px;backdrop-filter:blur(22px) saturate(1.3);-webkit-backdrop-filter:blur(22px) saturate(1.3);background:linear-gradient(rgba(8,6,10,.12),rgba(8,6,10,.52));border-top:1px solid rgba(255,255,255,.08)}
.pcard .ptitle{font-size:16.5px;font-weight:700;line-height:1.25}
.pcard .psub{font-size:13px;color:rgba(255,255,255,.62);font-weight:500}
.pcard .pmeta{display:flex;align-items:center;gap:14px;font-size:11.5px;color:rgba(255,255,255,.75);margin-top:9px}
.pcard .pmeta span{display:inline-flex;align-items:center;gap:5px}
.chiplet{position:absolute;top:12px;left:12px;display:inline-flex;align-items:center;gap:6px;background:rgba(10,7,6,.68);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:6px 12px;font-size:11px;font-weight:600}
.chiplet.ext{color:var(--purple);border-color:rgba(192,132,252,.4)}
.chiplet.inv{color:var(--amber);border-color:rgba(251,191,36,.4)}
.pricepill{display:inline-flex;align-items:center;background:rgba(20,60,35,.55);backdrop-filter:blur(8px);border:1px solid rgba(74,222,128,.35);color:var(--green);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:600}
.savebtn{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(10,7,6,.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);display:grid;place-items:center;color:#fff}
.gt{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#fff}
.avstack{display:flex;margin-right:6px}
.avstack i{width:20px;height:20px;border-radius:50%;background-size:cover;border:1.5px solid rgba(0,0,0,.5);margin-left:-7px}
.avstack i:first-child{margin-left:0}
/* top picks: landscape */
.toppicks{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px}
.pcard.land{aspect-ratio:16/10.5}
/* poster masonry */
.masonry{column-count:4;column-gap:18px}
@media(max-width:1200px){.masonry{column-count:3}}
@media(max-width:860px){.masonry{column-count:2}}
.masonry .pcard{margin-bottom:18px;break-inside:avoid;display:block}
.pcard.r34{aspect-ratio:3/4.1}.pcard.r45{aspect-ratio:4/4.6}.pcard.r11{aspect-ratio:1/1.15}
.blurhide{filter:blur(5px);opacity:.75}
/* sentence filters */
.sentence{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-family:var(--serif);font-size:24px;margin:36px 0 4px}
.sfilter{display:inline-flex;align-items:center;gap:7px;font-family:var(--sans);font-size:13px;font-weight:600;background:var(--surface);border:1px solid var(--line2);border-radius:999px;padding:8px 14px;cursor:pointer}
.sfilter:hover{border-color:rgba(255,255,255,.3)}

/* ---------- event detail ---------- */
.evhero{position:relative;margin:0 -34px;padding:26px 34px 0;min-height:480px;display:flex;align-items:flex-start}
.evhero .art{position:absolute;top:0;right:0;bottom:0;width:62%;background-size:cover;background-position:center 20%;-webkit-mask-image:linear-gradient(to left,rgba(0,0,0,1) 55%,transparent);mask-image:linear-gradient(to left,rgba(0,0,0,1) 55%,transparent)}
.evhero .art::after{content:"";position:absolute;inset:0;background:linear-gradient(rgba(7,4,3,0) 55%,var(--bg))}
.evhero .info{position:relative;z-index:2;padding-top:60px;max-width:520px}
.evhero h1{font-size:clamp(44px,4.6vw,64px);letter-spacing:-.03em}
.evhero .co{font-size:26px;color:var(--dim);font-weight:500;margin-top:2px}
.metalist{display:flex;flex-direction:column;gap:12px;margin-top:26px;font-size:15px;color:#ddd5d0}
.bookpanel{position:relative;z-index:3;background:rgba(14,9,8,.72);border:1px solid var(--line);border-radius:24px;padding:28px;margin-top:-40px;backdrop-filter:blur(18px)}
.bookgrid{display:grid;grid-template-columns:1fr 380px;gap:34px;align-items:start}
@media(max-width:980px){.bookgrid{grid-template-columns:1fr}}
.crumb{font-family:var(--serif);font-size:26px;margin-bottom:22px}
.crumb .dimc{color:var(--dim2)}
.trow{display:flex;align-items:center;gap:16px;padding:16px 18px;border-radius:16px;border:1.5px dashed transparent;margin-bottom:10px;transition:opacity .15s,border-color .15s;cursor:pointer}
.trow.sel{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.03)}
.trow.dim{opacity:.5}
.trow .radio{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--dim2);display:grid;place-items:center;flex:none}
.trow.sel .radio{border-color:var(--orange);background:var(--orange);color:#1a0d00}
.trow .tname{font-size:16px;font-weight:600}
.trow .tdesc{font-size:12.5px;color:var(--dim);margin-top:2px}
.trow .price{font-family:var(--mono);font-size:20px;white-space:nowrap}
.trow .price .cur{font-size:11px;color:var(--dim);margin-right:5px}
.qstep{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:999px;padding:3px}
.qstep button{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:var(--text)}
.qstep button:hover{background:rgba(255,255,255,.1)}
.qstep .v{min-width:26px;text-align:center;font-family:var(--mono);font-size:15px}
/* ticket stub preview */
.stubwrap{position:relative;min-height:360px}
.stub{position:absolute;inset:0;margin:auto;width:300px;height:340px;border-radius:18px;overflow:hidden;background:#120b09;outline:1px solid rgba(255,255,255,.14);box-shadow:0 30px 70px -20px rgba(0,0,0,.85)}
.stub .simg{height:57%;background-size:cover;background-position:center}
.stub .sbody{padding:16px}
.stub .stype{font-family:var(--mono);font-size:17px;letter-spacing:.08em;color:#cfc7c2}
.stub .sname{font-size:15px;font-weight:600;margin-top:6px}
.stub.back{transform:rotate(-7deg) translate(-16px,14px);opacity:.5;filter:brightness(.7)}
.stub.front{transform:rotate(3deg)}
/* whats included */
.wi{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:0;background:rgba(255,255,255,.025);border:1px solid var(--line);border-radius:20px;padding:28px;margin-top:26px}
.wi>div{padding:0 22px;border-left:1px solid var(--line)}
.wi>div:first-child{border-left:none;padding-left:0}
.wi .l1{color:var(--dim);font-size:16px;margin-top:14px}
.wi .l2{font-size:17px;font-weight:700}

/* ---------- checkout ---------- */
.cogrid{display:grid;grid-template-columns:1fr 400px;gap:30px;align-items:start}
@media(max-width:900px){.cogrid{grid-template-columns:1fr}}
.card{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:20px;padding:22px}
.kv{display:flex;justify-content:space-between;font-size:13.5px;padding:4px 0}
.kv .k{color:var(--dim)}
.kv .mono{font-size:13px}
.divider{height:1px;background:var(--line);margin:8px 0}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.field label{font-size:12px;color:var(--dim)}
.input{background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:12px;padding:13px 14px;color:var(--text);font:inherit;font-size:14px;width:100%;outline:none}
.input:focus{border-color:rgba(245,133,31,.6)}
.input.mono{font-family:var(--mono);letter-spacing:.06em}
.holdbar{display:inline-flex;align-items:center;gap:9px;background:rgba(245,133,31,.1);border:1px solid rgba(245,133,31,.3);border-radius:999px;padding:9px 16px;font-size:12.5px;color:#ffb066}

/* ---------- ticket modal page ---------- */
.tkstage{position:relative;min-height:calc(100vh - 60px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px 110px;margin:0 -34px}
.tkstage .bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(42px) brightness(.32) saturate(1.2);transform:scale(1.15)}
.tkcard{position:relative;width:352px;border-radius:20px;overflow:hidden;background:#101d2b;outline:1px solid rgba(255,255,255,.16);box-shadow:0 50px 110px -30px rgba(0,0,0,.9)}
.tkcard .thero{position:relative;height:300px;background-size:cover;background-position:center}
.tkcard .thero .tw{position:absolute;top:14px;left:16px;font-size:10px;font-weight:800;letter-spacing:.2em}
.tkcard .thero .cap{position:absolute;left:0;right:0;bottom:0;padding:16px;background:linear-gradient(transparent,rgba(9,14,22,.9))}
.tkcard .cap h3{font-size:21px}.tkcard .cap .co{color:rgba(255,255,255,.55);font-weight:500}
.tkcard .tmeta{display:flex;gap:14px;padding:12px 16px;font-size:10.5px;color:rgba(255,255,255,.75)}
.tkcard .tmeta span{display:inline-flex;gap:5px;align-items:center}
.tkgrid{margin:4px 16px 14px;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;opacity:.6}
.tkgrid div{font-family:var(--mono);font-size:8.5px;line-height:1.5}
.tkgrid b{display:block;font-size:9px;color:#dfe8f2}
.perf{position:relative;border-top:2px dashed rgba(255,255,255,.22);margin:0 10px}
.perf::before,.perf::after{content:"";position:absolute;top:-13px;width:26px;height:26px;border-radius:50%;background:var(--bg)}
.perf::before{left:-24px}.perf::after{right:-24px}
.tkqr{display:flex;align-items:center;justify-content:center;gap:14px;padding:20px 16px 24px}
.vlab{font-family:var(--mono);font-size:9px;letter-spacing:.22em;color:rgba(255,255,255,.5);writing-mode:vertical-rl;text-orientation:mixed}
.vlab.flip{transform:rotate(180deg)}
.qrbox{background:#fff;border-radius:10px;padding:8px;width:132px;height:132px}
.tkactions{position:relative;display:flex;gap:10px;margin-top:22px}

/* ---------- profile ---------- */
.profhead{display:flex;align-items:center;gap:18px;justify-content:center;padding:36px 0 8px}
.profhead .pavatar{width:74px;height:74px;border-radius:50%;background-size:cover;outline:2px solid rgba(255,255,255,.15)}
.profgrid{display:grid;grid-template-columns:340px 1fr;gap:26px;align-items:start;margin-top:26px}
@media(max-width:900px){.profgrid{grid-template-columns:1fr}}
.plist{display:flex;flex-direction:column;gap:4px}
.plist .pitem{display:flex;align-items:center;gap:11px;padding:13px 14px;border-radius:12px;font-size:14px;color:var(--dim);cursor:pointer}
.plist .pitem:hover{background:rgba(255,255,255,.05);color:var(--text)}
.plist .pitem.on{background:rgba(255,255,255,.07);color:var(--text)}
.pring{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--dim2);display:grid;place-items:center;flex:none;color:transparent}
.pitem.on .pring{border-color:var(--green);color:var(--green)}
.bkrow{display:grid;grid-template-columns:280px 1fr;gap:0;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:20px;overflow:hidden}
.bkrow .bimg{position:relative;background-size:cover;background-position:center;min-height:200px}
.bkrow .datebadge{position:absolute;left:12px;bottom:12px;background:rgba(10,7,6,.75);backdrop-filter:blur(6px);border-radius:10px;padding:7px 11px;text-align:center;font-size:10px;color:var(--dim)}
.bkrow .datebadge b{display:block;font-size:16px;color:var(--text)}
@media(max-width:760px){.bkrow{grid-template-columns:1fr}}
.appcard{background:linear-gradient(150deg,rgba(245,133,31,.1),rgba(201,51,10,.06));border:1px solid rgba(245,133,31,.25);border-radius:20px;padding:20px}

/* ---------- organiser / door (carried over, restyled by tokens) ---------- */
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:16px;padding:14px 30px;background:rgba(10,7,6,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.topbar .links{display:flex;gap:22px;font-size:13px;color:var(--dim)}
.topbar .links a{cursor:pointer}
.topbar .links a.on,.topbar .links a:hover{color:var(--text)}
.avatar{width:34px;height:34px;border-radius:50%;background-size:cover;background-position:center;flex:none;outline:1px solid rgba(255,255,255,.12)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700}
.b-live{background:rgba(74,222,128,.14);color:var(--green)}.b-draft{background:rgba(251,191,36,.14);color:var(--amber)}
.b-sold{background:rgba(255,90,79,.14);color:var(--red)}.b-soon{background:rgba(255,255,255,.08);color:var(--dim)}
.stat{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:16px;padding:16px}
.stat .l{font-size:12px;color:var(--dim)}.stat .v{font-size:26px;font-weight:800;margin-top:4px}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim2);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--line)}
.tbl td{padding:12px;border-bottom:1px solid var(--line)}
.tbl tr:hover td{background:rgba(255,255,255,.025)}
.search{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:999px;padding:9px 15px;color:var(--dim);font-size:13px}
.search input{flex:1;background:none;border:none;color:var(--text);font:inherit;outline:none;min-width:0}
.tabletframe{max-width:1120px;margin:24px auto;background:linear-gradient(140deg,#2c2724,#151110);border-radius:34px;padding:12px;box-shadow:0 40px 90px -20px rgba(0,0,0,.7)}
.tabletscreen{background:var(--bg);border-radius:24px;overflow:hidden;min-height:640px;display:flex;flex-direction:column}
.scan-tier{border-radius:16px;padding:22px;text-align:center;background:var(--tc);color:var(--tk)}
.scan-tier .lbl{font-size:40px;font-weight:800;line-height:1}
.scan-tier .bnd{font-size:15px;font-weight:700;margin-top:8px;opacity:.9}
.floorwrap{position:relative;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:linear-gradient(150deg,#160f14,#0c0a10)}
.fp-node{cursor:pointer}
.fp-node .seat{stroke:rgba(255,255,255,.5);stroke-width:1.5}
.fp-node .lbl{fill:#fff;font-size:9px;font-weight:700;text-anchor:middle;pointer-events:none}
.fp-zone{fill:rgba(255,255,255,.03);stroke:rgba(255,255,255,.14);stroke-dasharray:5 5}
.fp-label{fill:var(--dim2);font-size:9px;font-weight:700;letter-spacing:.14em;text-anchor:middle}
.fp-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--dim);padding:10px 4px 0}
.fp-legend i{width:11px;height:11px;border-radius:4px;display:inline-block;margin-right:5px;vertical-align:-1px}
.tierrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 15px;border:1px solid var(--line);border-radius:13px;margin-bottom:10px;border-left:3px solid var(--tc)}
.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(12px);background:#221a17;border:1px solid var(--line2);border-radius:12px;padding:13px 18px;font-size:13.5px;box-shadow:0 16px 40px rgba(0,0,0,.6);opacity:0;transition:.25s;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* search overlay */
.sov{position:fixed;inset:0;background:rgba(5,3,2,.7);backdrop-filter:blur(8px);z-index:120;display:none;align-items:flex-start;justify-content:center;padding-top:16vh}
.sov.open{display:flex}
.sov .box{width:min(620px,90vw)}
.sov input{width:100%;background:rgba(20,14,12,.9);border:1px solid var(--line2);border-radius:16px;padding:18px 22px;font:inherit;font-size:17px;color:var(--text);outline:none}
@media(max-width:820px){.nav{display:none}.page{padding:0 18px 40px}.hero,.evhero,.tkstage{margin:0 -18px}.pillnav{display:none}}
</style>

</div>

<div class="sov" id="sov" onclick="if(event.target===this)this.classList.remove('open')"><div class="box"><input id="sovin" placeholder="Search events, venues, artists… (Esc to close)" oninput="sovFilter(this.value)"></div></div>

<script>
const ic=(n,c="")=>`<svg class="ic ${c}"><use href="#i-${n}"/></svg>`;
const img=(id,w)=>`https://images.unsplash.com/${id}?auto=format&fit=crop&w=${w||900}&q=72`;
const face=n=>`https://i.pravatar.cc/120?img=${n}`;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}

/* ---- canonical data (grounded in their staging flow: GA 120 / VIP 220 · HKD · 8% fee) ---- */
const IMG={dj:'photo-1516450360452-9312f5e86fc7',crowd:'photo-1470229722913-7c0e2dbbafd3',neon:'photo-1545128485-c400e7702796',club:'photo-1574391884720-bbc3740c59d1',bar:'photo-1566737236500-c8ac43014a67',roof:'photo-1517457373958-b7bdd4587205',girls:'photo-1533174072545-7a4b6ad7a6c3',ball:'photo-1519671482749-fd09be7ccebf',haze:'photo-1493676304819-0d7a8d026dcf',blu:'photo-1508997449629-303059a039c0',led:'photo-1571204829887-3b8d69e4094d',sky:'photo-1438557068880-c5f474830377'};
const EV={name:'Joyhauser',co:'Fayy',date:'Sat, 30th May 2025',time:'11:00 PM onwards',venue:'Galpao Aurora Stadium',img:IMG.dj,ref:'MND-300525-2K9P'};
const TICKETS=[
  {k:'ga', name:'General Ticket', desc:'Access to main event area', price:120, max:8},
  {k:'vip',name:'VIP Access',     desc:'Fast-track entry · VIP deck', price:220, max:6},
  {k:'bs', name:'Backstage',      desc:'Meet the artists · private bar', price:480, max:0, sold:true}
];
let CART={ga:1};
const cartCount=()=>Object.values(CART).reduce((a,b)=>a+b,0);
const cartSub=()=>TICKETS.reduce((s,t)=>s+(CART[t.k]||0)*t.price,0);

const CARDS=[ // discover masonry — card variants from the design system
 {kind:'pub', r:'r34', img:IMG.led,  title:'YUME Live Sessions', sub:'25/6: Midnight Escape', price:200, loc:'Vault Club, Central', dt:'18th June, 4:30pm'},
 {kind:'pub', r:'r45', img:IMG.girls,title:'Girls Night',        sub:'Feito por elas, para elas', price:160, loc:'Galpao Aurora Stadium', dt:'27th June, 11pm'},
 {kind:'ext', r:'r11', img:IMG.haze, title:'Indio Empire',       sub:'Desert festival takeover', price:200, loc:'Kwun Tong Underpass', dt:'2nd July, 9pm'},
 {kind:'pub', r:'r45', img:IMG.ball, title:'Kwun Tong Underpass',sub:'Transformation', price:120, loc:'Kwun Tong', dt:'30th May, 11pm'},
 {kind:'priv',r:'r34', img:IMG.neon, title:'YUME After Dark',    sub:'Invite only', price:0,   loc:'', dt:''},
 {kind:'pub', r:'r11', img:IMG.blu,  title:'Blue Hour',          sub:'Open-air sunset set', price:140, loc:'The Terrace, Central', dt:'5th July, 6pm'},
 {kind:'pub', r:'r34', img:IMG.club, title:'Pulse Sunday',       sub:'Techno all night', price:120, loc:'Neon Room, Wan Chai', dt:'28th June, 11pm'},
 {kind:'ext', r:'r45', img:IMG.sky,  title:'Skyline Sessions',   sub:'Rooftop rave', price:180, loc:'Skyline Lounge, TST', dt:'12th July, 8pm'}
];

/* ================= SCREENS ================= */
const SCREENS=[
 {id:'a-discover',t:'Discover',m:'a',g:'Browse'},
 {id:'a-event',t:'Event · Joyhauser',m:'a',g:'Buy'},
 {id:'a-checkout',t:'Checkout',m:'a',g:'Buy'},
 {id:'a-ticket',t:'Ticket · confirmed',m:'a',g:'Buy',tag:'modal'},
 {id:'a-profile',t:'Profile & bookings',m:'a',g:'After'},
 {id:'o-dash',t:'Dashboard',m:'o',g:'Manage'},
 {id:'o-create',t:'Create / edit event',m:'o',g:'Manage',tag:'floor builder'},
 {id:'o-orders',t:'Orders & attendees',m:'o',g:'Manage'},
 {id:'d-scan',t:'Door scanner',m:'d',g:'Tablet'},
 {id:'d-floor',t:'Live floor status',m:'d',g:'Tablet'}
];
const SB={};

/* ---------- product chrome ---------- */
const FILTERS=[['All Events',['All Events','Clubs','Bars','Festivals']],['This week',['This week','This month','Any date']],['Hong Kong',['Hong Kong','Kowloon','HK Island']]];
const pnav=()=>`
 <div class="pnav">
   <div class="wordmark">MANDOS</div>
   <div class="pillnav">${FILTERS.map((f,i)=>`<span class="pn" data-fi="${i}" onclick="cycleFilter(this)">${f[0]} ${ic('down','sm')}</span>`).join('')}</div>
   <div class="row" style="gap:10px;margin-left:auto"><button class="btn btn-ghostp" onclick="toast('Partner onboarding — merchant side')">Become a Partner</button><button class="btn btn-white">Download the app</button></div>
 </div>`;
function cycleFilter(el){const f=FILTERS[+el.dataset.fi];const cur=el.textContent.trim();const i=f[1].findIndex(v=>cur.startsWith(v));el.innerHTML=f[1][(i+1)%f[1].length]+' '+ic('down','sm');toast('Filter · '+f[1][(i+1)%f[1].length]);}
const dock=(active)=>`
 <div class="dock">
   <button class="dpill" onclick="go('a-discover')">${ic('disc','sm')} Discover</button>
   <button class="dic dis" title="Map — coming soon" aria-disabled="true">${ic('map','sm')}</button>
   <button class="dic ${active==='profile'?'on':''}" onclick="go('a-profile')" title="Profile">${ic('user','sm')}</button>
   <button class="dic" onclick="openSearch()" title="Search">${ic('search','sm')}</button>
 </div>`;
function openSearch(){const s=document.getElementById('sov');s.classList.add('open');document.getElementById('sovin').focus();}
function sovFilter(q){q=q.toLowerCase();document.querySelectorAll('.masonry .pcard').forEach(c=>{c.style.display=(c.dataset.name||'').includes(q)?'':'none';});}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('sov').classList.remove('open');});

/* ---------- card builders (design-system variants) ---------- */
const avrow=(n)=>`<span class="avstack">${[31,22,15].map(s=>`<i style="background-image:url('${face(s)}')"></i>`).join('')}</span>+${n} interested`;
function posterCard(c){
  const name=(c.title+' '+c.sub).toLowerCase();
  if(c.kind==='priv') return `<div class="pcard ${c.r}" data-name="${name}" style="background-image:url('${img(c.img,640)}')" onclick="toast('Private event — invite only')">
    <span class="chiplet inv">${ic('lock','sm')} Private Event</span><button class="savebtn" onclick="event.stopPropagation();toast('Saved')">${ic('bookmark','sm')}</button>
    <div class="pfoot"><span class="chiplet inv" style="position:static;margin-bottom:9px;display:inline-flex">Invite Only</span>
      <div class="ptitle">${c.title}</div><div class="psub">${c.sub}</div>
      <div class="pmeta blurhide"><span>${ic('lock','sm')} Event details are hidden by the organiser</span></div></div></div>`;
  const chip=c.kind==='ext'?`<span class="chiplet ext">${ic('ext','sm')} External Event</span>`:`<span class="chiplet">${ic('star','sm')} Featured</span>`;
  return `<div class="pcard ${c.r}" data-name="${name}" style="background-image:url('${img(c.img,640)}')" onclick="go('a-event')">
    ${chip}<button class="savebtn" onclick="event.stopPropagation();toast('Saved to your list')">${ic('bookmark','sm')}</button>
    <div class="pfoot">
      <span class="pricepill" style="margin-bottom:9px">HK $${c.price}</span>
      <div class="ptitle">${c.title}</div><div class="psub">${c.sub}</div>
      <div class="pmeta"><span>${ic('loc','sm')} ${c.loc}</span><span>${ic('cal','sm')} ${c.dt}</span></div>
    </div></div>`;
}
const topPick=(imgId,i)=>`
 <div class="pcard land" data-name="joyhauser fayy" style="background-image:url('${img(imgId,900)}')" onclick="go('a-event')">
   <span class="chiplet">${ic('star','sm')} Top Event this week</span>
   <div class="pfoot">
     <div class="between"><div><div class="ptitle">Joyhauser</div><div class="psub">Fayy</div></div><span class="chiplet" style="position:static">SAT, 30 MAY · 11:00 PM</span></div>
     <div class="pmeta between"><span>${avrow(13+i)}</span><span class="gt">Get Tickets ${ic('fwd','sm')}</span></div>
   </div></div>`;

/* ================= ATTENDEE ================= */
SB['a-discover']=()=>pnav()+`
<div class="page">
  <div class="hero">
    <div class="bgimg" style="background-image:url('${img(IMG.crowd,1400)}')"></div><div class="tint"></div>
    <h1>Find what’s happening before<br><em>everyone else.</em></h1>
  </div>
  <div class="sechead">Top Picks <span class="lite">for this week</span> <span class="arrow">${ic('fwd','sm')}</span></div>
  <div class="toppicks">${[IMG.dj,IMG.ball,IMG.haze].map(topPick).join('')}</div>
  <div class="sentence">Happening in <span class="sfilter">${ic('loc','sm')} Hong Kong ${ic('down','sm')}</span> from <span class="sfilter">${ic('cal','sm')} 20th May ${ic('down','sm')}</span> to <span class="sfilter">${ic('cal','sm')} 31st June ${ic('down','sm')}</span>.</div>
  <div style="height:18px"></div>
  <div class="masonry">${CARDS.map(posterCard).join('')}</div>
</div>`+dock('discover');

SB['a-event']=()=>pnav()+`
<div class="page">
  <div class="evhero">
    <div class="art" style="background-image:url('${img(EV.img,1400)}')"></div>
    <div class="info">
      <button class="btn btn-ghostp" style="padding:8px 14px;font-size:12px;margin-bottom:26px" onclick="go('a-discover')">${ic('back','sm')} All events</button>
      <h1>${EV.name}</h1><div class="co">${EV.co}</div>
      <div class="metalist">
        <span>${ic('cal')} &nbsp;${EV.date}</span>
        <span>${ic('clock')} &nbsp;${EV.time}</span>
        <span>${ic('map')} &nbsp;${EV.venue}</span>
      </div>
    </div>
  </div>

  <div class="bookpanel">
    <div class="crumb"><span class="dimc">Book Ticket</span> › Choose Your Experience</div>
    <div class="bookgrid">
      <div>
        <div id="trows"></div>
        <button class="btn btn-grad lg block" style="margin-top:18px" onclick="go('a-checkout')" id="coBtn">Continue to Checkout</button>
      </div>
      <div class="stubwrap">
        <div class="stub back"><div class="simg" style="background-image:url('${img(EV.img,600)}')"></div><div class="sbody"><div class="stype">GENERAL TICKET</div><div class="sname">${EV.name}, <span class="muted">${EV.co}</span></div></div></div>
        <div class="stub front"><div class="simg" style="background-image:url('${img(EV.img,600)}')"></div><div class="sbody"><div class="stype" id="stubType">GENERAL TICKET</div><div class="sname">${EV.name}, <span class="muted">${EV.co}</span></div><div class="muted" style="font-size:11px;margin-top:6px">${EV.date} · ${EV.venue}</div></div></div>
      </div>
    </div>
  </div>

  <div class="sechead" style="font-size:22px">${ic('clock','sm')}&nbsp; Whats <span class="lite">Included</span> <span class="arrow">${ic('fwd','sm')}</span></div>
  <div class="wi">
    <div>${ic('hp','lg')}<div class="l1">World-class</div><div class="l2">DJ performance</div></div>
    <div>${ic('glass','lg')}<div class="l1">State-of-the-art</div><div class="l2">sound &amp; lighting</div></div>
    <div>${ic('spark','lg')}<div class="l1">Multiple bars &amp;</div><div class="l2">gourmet food stalls</div></div>
    <div>${ic('shirt','lg')}<div class="l1">Merchandise &amp;</div><div class="l2">exclusive experiences</div></div>
  </div>
</div>`+dock('');

function renderTrows(){
  const el=document.getElementById('trows');if(!el)return;
  el.innerHTML=TICKETS.map(t=>{
    const q=CART[t.k]||0;const sel=q>0;
    return `<div class="trow ${sel?'sel':t.sold?'dim':'dim'}" onclick="${t.sold?`toast('Backstage is sold out')`:`tAdd('${t.k}',1,${t.max})`}">
      <span class="radio">${sel?ic('check','sm'):''}</span>
      <div class="grow"><div class="tname">${t.name}</div><div class="tdesc">${t.desc}</div></div>
      <div class="price"><span class="cur">HKD</span>${t.price}</div>
      ${t.sold?`<span class="muted" style="font-size:12px">Sold out</span>`:`<div class="qstep" onclick="event.stopPropagation()"><button onclick="tAdd('${t.k}',-1,${t.max})">${ic('minus','sm')}</button><span class="v">${q}</span><button onclick="tAdd('${t.k}',1,${t.max})">${ic('plus','sm')}</button></div>`}
    </div>`;}).join('');
  const btn=document.getElementById('coBtn');
  if(btn)btn.innerHTML=cartCount()?`Continue to Checkout · <span class="mono" style="font-weight:400">HKD ${cartSub()}</span>`:'Continue to Checkout';
  const st=document.getElementById('stubType');
  if(st)st.textContent=(CART.vip?'VIP TICKET':'GENERAL TICKET');
}
function tAdd(k,d,max){CART[k]=Math.max(0,Math.min(max,(CART[k]||0)+d));if(!CART[k])delete CART[k];renderTrows();}

SB['a-checkout']=()=>pnav()+`

function renderCheckout(){
  let items=TICKETS.filter(t=>CART[t.k]).map(t=>[`${t.name} × ${CART[t.k]}`,CART[t.k]*t.price]);
  if(!items.length)items=[['General Ticket × 1',120]];
  const sub=items.reduce((a,b)=>a+b[1],0),fee=Math.round(sub*.08),total=sub+fee;
  document.getElementById('coItems').innerHTML=items.map(i=>`<div class="kv"><span class="k">${i[0]}</span><span class="mono">HKD ${i[1]}</span></div>`).join('');
  document.getElementById('coTotals').innerHTML=`<div class="kv"><span class="k">Subtotal</span><span class="mono">HKD ${sub}</span></div>
    <div class="kv"><span class="k">Service fee (8%)</span><span class="mono">HKD ${fee}</span></div>
    <div class="kv b7" style="font-size:15px;padding-top:8px"><span>Total</span><span class="mono">HKD ${total}</span></div>`;
  document.getElementById('payBtn').innerHTML=`Pay · <span class="mono" style="font-weight:400">HKD ${total}</span>`;
}

/* ================= ROUTER ================= */
let MODE='a';
function renderNav(){
  const groups={};
  SCREENS.filter(s=>s.m===MODE).forEach(s=>{(groups[s.g]=groups[s.g]||[]).push(s);});
  document.getElementById('navlist').innerHTML=Object.entries(groups).map(([g,items])=>
    `<div class="navgrp">${g}</div>`+items.map(s=>`<button class="navitem" data-id="${s.id}" onclick="go('${s.id}')">${s.t}${s.tag?`<span class="tg">${s.tag}</span>`:''}</button>`).join('')).join('');
}
function go(id){
  const el=document.getElementById('screens');
  el.innerHTML=(SB[id]||(()=>'<div class="page">—</div>'))();
  window.scrollTo(0,0);
  document.getElementById('sov').classList.remove('open');
  document.querySelectorAll('.navitem').forEach(n=>n.classList.toggle('on',n.dataset.id===id));
  const m=(SCREENS.find(s=>s.id===id)||{}).m;
  if(m&&m!==MODE){MODE=m;document.querySelectorAll('#modeseg button').forEach((b,i)=>b.classList.toggle('on',['a','o','d'][i]===MODE));renderNav();document.querySelectorAll('.navitem').forEach(n=>n.classList.toggle('on',n.dataset.id===id));}
  el.querySelectorAll('[id^=qr]').forEach(makeQR);
  if(id==='a-event')renderTrows();
  if(id==='a-checkout')renderCheckout();
}
function setMode(m){MODE=m;document.querySelectorAll('#modeseg button').forEach((b,i)=>b.classList.toggle('on',['a','o','d'][i]===m));renderNav();go(SCREENS.find(s=>s.m===m).id);}
function makeQR(el){const N=21;let seed=(+el.dataset.seed)||42;const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
  let r=`<svg viewBox="0 0 ${N} ${N}" width="100%" height="100%">`;
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){const f=(x<7&&y<7)||(x>=N-7&&y<7)||(x<7&&y>=N-7);if(f)continue;if(rnd()>.55)r+=`<rect x="${x}" y="${y}" width="1" height="1" fill="#000"/>`;}
  [[0,0],[N-7,0],[0,N-7]].forEach(([fx,fy])=>{r+=`<rect x="${fx}" y="${fy}" width="7" height="7" fill="#000"/><rect x="${fx+1}" y="${fy+1}" width="5" height="5" fill="#fff"/><rect x="${fx+2}" y="${fy+2}" width="3" height="3" fill="#000"/>`;});
  el.innerHTML=r+`</svg>`;}

renderNav();
go('a-discover');
</script>
